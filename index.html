<title>World Cup 2026 — Live</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Anton&family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
<script crossorigin src="https://cdnjs.cloudflare.com/ajax/libs/react/18.3.1/umd/react.production.min.js"></script>
<script crossorigin src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.3.1/umd/react-dom.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.28.4/babel.min.js"></script>
<style>
  :root{
    --navy:#081230; --navy2:#0B1B40; --panel:#0E2150; --panel2:#15306A;
    --line:#22386C; --line2:#33508F;
    --ink:#F4F7FD; --mut:#9DB0D6; --mut2:#6B7DA8;
    --live:#FF4257; --gold:#F2C14E; --white:#F4F7FD;
    --teamA:#E2483D; --teamAink:#ffffff; --teamB:#5B8DEF;
    --shadow:0 18px 50px -22px rgba(0,0,0,.85);
  }
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
  html{-webkit-text-size-adjust:100%;text-size-adjust:100%}
  html,body{margin:0;padding:0}
  body{
    font-family:'Inter',system-ui,sans-serif;color:var(--ink);
    background:
      radial-gradient(900px 460px at 50% -6%, rgba(91,141,239,.14), transparent 62%),
      radial-gradient(2px 2px at 12% 18%, rgba(255,255,255,.22), transparent 40%),
      radial-gradient(2px 2px at 78% 9%, rgba(255,255,255,.16), transparent 40%),
      radial-gradient(1.5px 1.5px at 34% 6%, rgba(255,255,255,.18), transparent 40%),
      linear-gradient(180deg, var(--navy) 0%, #060D24 100%);
    background-attachment:fixed;
    min-height:100vh;min-height:100dvh;-webkit-font-smoothing:antialiased;
  }
  .wrap{max-width:1180px;margin:0 auto;padding:22px 20px 80px;
    padding-left:max(20px,env(safe-area-inset-left));padding-right:max(20px,env(safe-area-inset-right));
    padding-top:max(22px,env(safe-area-inset-top));padding-bottom:max(80px,calc(env(safe-area-inset-bottom) + 60px))}
  .stripebar{height:4px;border-radius:4px;margin-bottom:18px;background:linear-gradient(90deg,var(--teamA),var(--white) 50%,var(--teamA));opacity:.9}

  .top{display:flex;justify-content:space-between;align-items:flex-end;gap:20px;flex-wrap:wrap;padding-bottom:16px}
  .brand{display:flex;align-items:center;gap:15px}
  .favbadge{display:flex;align-items:center;gap:9px;background:var(--panel);border:1px solid var(--line2);border-radius:30px;padding:6px 14px 6px 8px;align-self:center}
  .favbadge .markbig{width:34px;height:34px}
  .favbadge span{display:flex;flex-direction:column;line-height:1.15;font-weight:800;font-size:14px}
  .favbadge small{font-size:9px;letter-spacing:.12em;text-transform:uppercase;color:var(--gold);font-weight:700}
  .brand .eyebrow{font-size:11px;letter-spacing:.3em;text-transform:uppercase;color:var(--gold);font-weight:700}
  .brand h1{font-family:'Anton',sans-serif;font-weight:400;margin:1px 0 4px;line-height:.98;font-size:clamp(40px,8vw,68px);letter-spacing:.01em;padding-bottom:4px;
    background:linear-gradient(180deg,#fff 35%,#cdddff 75%,var(--teamB));-webkit-background-clip:text;background-clip:text;color:transparent}
  .brand .hosts{font-size:11px;letter-spacing:.2em;text-transform:uppercase;color:var(--mut);font-weight:600}
  .ctrls{display:flex;flex-direction:column;align-items:flex-end;gap:10px}
  .updated{font-size:12px;color:var(--mut);display:flex;align-items:center;gap:8px;flex-wrap:wrap;justify-content:flex-end}
  .updated b{color:var(--ink);font-weight:600}
  .btnrow{display:flex;gap:8px;align-items:center;flex-wrap:wrap;justify-content:flex-end}
  .btn{font-family:inherit;font-size:13px;font-weight:600;color:var(--ink);background:var(--panel);border:1px solid var(--line2);border-radius:10px;padding:9px 14px;cursor:pointer;transition:.15s;display:inline-flex;align-items:center;gap:7px}
  .btn:hover{background:var(--panel2);border-color:var(--teamB)}
  .btn:focus-visible{outline:2px solid var(--teamB);outline-offset:2px}
  .btn.primary{background:var(--teamA);color:var(--teamAink);border-color:var(--teamA)}
  .btn.primary:hover{filter:brightness(1.08)}
  .btn[disabled]{opacity:.5;cursor:default}
  .btn.sm{padding:7px 10px;font-size:12px}
  .selmini{font-family:inherit;font-size:16px;background:var(--panel);border:1px solid var(--line2);color:var(--ink);border-radius:10px;padding:8px 10px;cursor:pointer;max-width:160px}
  .selmini:focus{outline:2px solid var(--teamB)}
  .toggle{display:inline-flex;align-items:center;gap:8px;font-size:12px;color:var(--mut);font-weight:600;cursor:pointer;user-select:none;background:none;border:0}
  .sw{width:38px;height:22px;border-radius:20px;background:var(--line);position:relative;transition:.18s;border:1px solid var(--line2)}
  .sw::after{content:"";position:absolute;top:2px;left:2px;width:16px;height:16px;border-radius:50%;background:var(--mut);transition:.18s}
  .toggle.on .sw{background:rgba(226,72,61,.30);background:color-mix(in srgb, var(--teamA) 35%, transparent);border-color:var(--teamA)}
  .toggle.on .sw::after{left:18px;background:var(--teamA)}
  .pillstat{font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.06em;padding:4px 9px;border-radius:20px}
  .pillstat.ok{color:var(--teamB);background:rgba(91,141,239,.16);background:color-mix(in srgb,var(--teamB) 16%,transparent);border:1px solid rgba(91,141,239,.4);border:1px solid color-mix(in srgb,var(--teamB) 40%,transparent)}
  .pillstat.dim{color:var(--mut);background:var(--panel2);border:1px solid var(--line)}
  .pillstat.cache{color:var(--gold);background:rgba(242,193,78,.12);border:1px solid rgba(242,193,78,.35)}

  .hero{display:flex;justify-content:space-between;align-items:center;gap:16px;flex-wrap:wrap;background:linear-gradient(120deg,var(--panel),var(--navy2));border:1px solid var(--line);border-radius:14px;padding:13px 18px;margin-bottom:18px;position:relative;overflow:hidden}
  .hero::after{content:"";position:absolute;right:-30px;top:-30px;width:160px;height:160px;background:radial-gradient(circle,rgba(226,72,61,.18),transparent 70%);background:radial-gradient(circle,color-mix(in srgb,var(--teamA) 20%,transparent),transparent 70%);pointer-events:none}
  .hero .live{display:inline-flex;align-items:center;gap:10px;font-family:'Anton',sans-serif;font-size:20px;letter-spacing:.02em}
  .hero .live .dot{width:10px;height:10px;border-radius:50%;background:var(--live);box-shadow:0 0 0 0 rgba(255,66,87,.7);animation:pulse 1.5s infinite}
  .hero .stage{font-size:13px;color:var(--mut);font-weight:600}
  .hero .stage b{color:var(--ink)}
  .cdown{display:flex;align-items:center;gap:10px;font-size:13px;color:var(--mut);font-weight:600}
  .cdown .units{display:flex;gap:6px}
  .cunit{background:var(--navy);border:1px solid var(--line2);border-radius:8px;padding:5px 8px;text-align:center;min-width:42px}
  .cunit b{display:block;font-family:'Anton',sans-serif;font-size:18px;color:var(--ink);line-height:1}
  .cunit span{font-size:9px;text-transform:uppercase;letter-spacing:.1em;color:var(--mut2)}

  .tabs{display:flex;gap:4px;margin:0 0 16px;background:var(--panel);border:1px solid var(--line);border-radius:13px;padding:5px;width:fit-content;max-width:100%;flex-wrap:wrap}
  .ticker{margin:0 0 18px;background:linear-gradient(180deg,var(--card),var(--panel));border:1px solid var(--line2);border-radius:14px;padding:11px 13px;overflow:hidden;transition:box-shadow .3s,border-color .3s}
  .ticker.flash{border-color:var(--live);box-shadow:0 0 0 2px rgba(214,40,40,.25),0 8px 30px rgba(214,40,40,.16)}
  .tklive{display:flex;align-items:center;gap:8px;font-size:11px;font-weight:800;letter-spacing:.1em;text-transform:uppercase;color:var(--live);margin-bottom:10px}
  .tkdot{width:9px;height:9px;border-radius:50%;background:var(--live);animation:tkpulse 1.1s infinite}
  @keyframes tkpulse{0%,100%{opacity:1;transform:scale(1)}50%{opacity:.35;transform:scale(.7)}}
  .tkscores{display:flex;gap:9px;flex-wrap:wrap;margin-bottom:2px}
  .tkscore{display:flex;align-items:center;gap:7px;background:var(--bg);border:1px solid var(--line);border-radius:11px;padding:7px 11px;cursor:pointer;font:inherit;color:var(--ink);transition:.15s}
  .tkscore:hover{border-color:var(--gold);transform:translateY(-1px)}
  .tkscore .mark{width:20px;height:20px}
  .tksc{font-family:'Anton',sans-serif;font-weight:400;font-size:18px;letter-spacing:.02em;display:flex;align-items:center;gap:3px}
  .tksc span{color:var(--mut2);font-size:13px}
  .tkmin{font-size:11px;font-weight:800;color:var(--live);background:rgba(214,40,40,.12);padding:2px 7px;border-radius:20px;margin-left:2px}
  .tkfeed{margin-top:11px;border-top:1px solid var(--line);padding-top:9px;overflow:hidden;position:relative;-webkit-mask-image:linear-gradient(90deg,transparent,#000 6%,#000 94%,transparent);mask-image:linear-gradient(90deg,transparent,#000 6%,#000 94%,transparent)}
  .tkmarquee{display:inline-flex;gap:30px;white-space:nowrap;animation:tkscroll 34s linear infinite;will-change:transform}
  .ticker:hover .tkmarquee{animation-play-state:paused}
  @keyframes tkscroll{from{transform:translateX(0)}to{transform:translateX(-50%)}}
  .tkgoal{font-size:12.5px;font-weight:600;color:var(--ink);cursor:pointer}
  .tkgoal b{color:var(--gold);font-weight:800;margin-right:2px}
  .tkg2{color:var(--mut);font-weight:600}
  .tkg2 i{color:var(--mut2);font-style:normal;padding:0 1px}
  .tab{font-family:inherit;font-size:13px;font-weight:700;letter-spacing:.03em;text-transform:uppercase;color:var(--mut);background:transparent;border:0;border-radius:9px;padding:10px 16px;cursor:pointer;transition:.15s}
  .tab:hover{color:var(--ink)}
  .tab.active{background:var(--panel2);color:var(--ink);box-shadow:inset 0 0 0 1px var(--line2)}
  .tab:focus-visible{outline:2px solid var(--teamB);outline-offset:2px}
  .tab .badge{display:inline-block;margin-left:7px;background:var(--live);color:#fff;font-size:10px;border-radius:20px;padding:1px 6px;vertical-align:1px}

  .filterbar{display:flex;align-items:center;gap:10px;margin:0 0 16px;flex-wrap:wrap}
  .chip{font-size:12px;font-weight:700;color:var(--mut);background:var(--panel);border:1px solid var(--line2);border-radius:20px;padding:7px 13px;cursor:pointer;display:inline-flex;align-items:center;gap:7px}
  .chip.on{color:var(--gold);border-color:var(--gold);background:rgba(242,193,78,.1)}
  .chip:focus-visible{outline:2px solid var(--teamB);outline-offset:2px}

  .datenav{display:flex;align-items:center;gap:12px;margin:0 0 16px}
  .datenav button{background:var(--panel);border:1px solid var(--line2);color:var(--ink);border-radius:10px;width:36px;height:36px;cursor:pointer;font-size:16px;flex:none}
  .datenav button:hover{border-color:var(--teamB)} .datenav button[disabled]{opacity:.4;cursor:default}
  .datenav .dl{font-size:14px;letter-spacing:.08em;text-transform:uppercase;color:var(--ink);font-weight:700;flex:1}
  .datenav .dc{font-size:12px;color:var(--mut);font-weight:600}

  .matches{display:grid;grid-template-columns:repeat(auto-fill,minmax(290px,1fr));gap:14px}
  .match{background:var(--panel);border:1px solid var(--line);border-radius:14px;padding:14px 16px;position:relative;overflow:hidden}
  .match.fav{box-shadow:inset 3px 0 0 var(--gold)}
  .match .meta{display:flex;justify-content:space-between;align-items:center;font-size:11px;color:var(--mut);text-transform:uppercase;letter-spacing:.08em;font-weight:600;margin-bottom:10px}
  .grp{display:inline-flex;align-items:center;justify-content:center;height:23px;padding:0 11px;border-radius:7px;background:rgba(242,193,78,.14);border:1px solid rgba(242,193,78,.45);color:var(--gold);font-weight:800;font-size:12px;letter-spacing:.09em;white-space:nowrap}
  .kotime{font-size:12px;color:var(--mut);font-weight:600}
  .row{display:flex;align-items:center;justify-content:space-between;gap:10px;padding:3px 0}
  .team{display:flex;align-items:center;gap:9px;font-weight:600;font-size:15px;min-width:0}
  .mark{width:20px;height:20px;object-fit:contain;flex:none}
  .markbig{width:30px;height:30px;object-fit:contain;flex:none}
  .teamlink{background:none;border:0;color:inherit;font:inherit;font-weight:600;cursor:pointer;padding:0;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:158px;text-align:left}
  .teamlink:hover{color:var(--teamB)}
  .teamlink:focus-visible{outline:2px solid var(--teamB);outline-offset:2px;border-radius:4px}
  .score{font-family:'Anton',sans-serif;font-size:30px;line-height:1;min-width:30px;text-align:right;letter-spacing:.02em}
  .match.win .team.lose .teamlink,.match.win .team.lose .mark{opacity:.5}
  .status{margin-top:10px;padding-top:10px;border-top:1px solid var(--line);display:flex;align-items:center;justify-content:space-between;font-size:12px;color:var(--mut);font-weight:600;gap:8px}
  .live-pill{display:inline-flex;align-items:center;gap:7px;color:var(--live);font-weight:800;text-transform:uppercase;letter-spacing:.06em}
  .dot{width:8px;height:8px;border-radius:50%;background:var(--live);box-shadow:0 0 0 0 rgba(255,66,87,.7);animation:pulse 1.5s infinite}
  .match.islive{border-color:rgba(255,66,87,.55);box-shadow:0 0 30px -12px rgba(255,66,87,.55)}
  .match.clickable{cursor:pointer;transition:.14s}
  .match.clickable:hover{border-color:var(--line2);transform:translateY(-2px)}
  .match.clickable:focus-visible{outline:2px solid var(--teamB);outline-offset:2px}
  .cardcta{width:100%;margin-top:11px;padding:9px;border-radius:9px;border:1px solid var(--line2);background:var(--panel2);color:var(--ink);font-family:inherit;font-weight:700;font-size:12.5px;cursor:pointer;transition:.14s}
  .cardcta:hover{border-color:var(--teamB)}
  .cardcta.live{background:var(--live);border-color:var(--live);color:#fff;animation:ctapulse 2s infinite}
  .cardcta.rev{background:var(--navy);border-color:var(--line2)}
  @keyframes ctapulse{0%,100%{box-shadow:0 0 0 0 rgba(255,66,87,.45)}50%{box-shadow:0 0 14px 0 rgba(255,66,87,.55)}}
  .following{font-size:10px;color:var(--gold);font-weight:800;letter-spacing:.04em}
  .ft{color:var(--mut2)} .ko{color:var(--teamB)}
  .detailbtn{background:none;border:0;color:var(--teamB);font:inherit;font-weight:700;cursor:pointer;font-size:12px}
  .detailbtn:hover{text-decoration:underline}
  @keyframes pulse{0%{box-shadow:0 0 0 0 rgba(255,66,87,.6)}70%{box-shadow:0 0 0 9px rgba(255,66,87,0)}100%{box-shadow:0 0 0 0 rgba(255,66,87,0)}}

async function espnScoreboard(dates){
  const url = ESPN+"/scoreboard?limit=320"+(dates?("&dates="+dates):"");
  const r = await fetch(url);
  if(!r.ok) throw new Error("ESPN "+r.status);

let _ytApi=null;
function loadYT(){
  if(typeof window==="undefined") return Promise.reject();
  if(window.YT&&window.YT.Player) return Promise.resolve(window.YT);
  if(_ytApi) return _ytApi;
  _ytApi=new Promise((res,rej)=>{ try{ const prev=window.onYouTubeIframeAPIReady; window.onYouTubeIframeAPIReady=()=>{ try{prev&&prev();}catch(e){} res(window.YT); }; const s=document.createElement("script"); s.src="https://www.youtube.com/iframe_api"; s.onerror=()=>rej(); document.head.appendChild(s); setTimeout(()=>{ if(window.YT&&window.YT.Player)res(window.YT); },6000); }catch(e){ rej(); } });
  return _ytApi;
}
function GoalClip({home,away,player,minute}){
  const ckey="clip_"+[home,away,player,minute].join("_").toLowerCase().replace(/[^a-z0-9]+/g,"").slice(0,90);
  const [vid,setVid]=useState(()=>{ const c=lsGet(ckey); return (c&&Array.isArray(c.ids)&&c.ids.length)?c:null; });
  const [st,setSt]=useState("idle");            // idle | load | live | blocked | none
  const [playing,setPlaying]=useState(false);   // only true once a video is CONFIRMED playing
  const [muted,setMuted]=useState(true);
  const [callNow,setCallNow]=useState(false);   // playing clip is a commentary/call clip
  const slot=useRef("yt_"+Math.random().toString(36).slice(2));
  const ytp=useRef(null), idx=useRef(0), order=useRef([]);
  const destroy=()=>{ try{ ytp.current&&ytp.current.destroy(); }catch(e){} ytp.current=null; };
  const resolve=async()=>{ if(vid&&vid.blocked){ setSt("blocked"); return; } if(vid&&vid.ids&&vid.ids.length){ setPlaying(false); setMuted(true); setSt("live"); return; } setSt("load");
    try{ const j=await fetchClip(home,away,player,minute); if(j&&j.found&&Array.isArray(j.ids)&&j.ids.length){ const v={ids:j.ids,start:parseInt(String(j.start))||0,callIds:Array.isArray(j.callIds)?j.callIds:[]}; lsSet(ckey,v); setVid(v); setPlaying(false); setMuted(true); setSt("live"); } else setSt("none"); }catch(e){ setSt("none"); } };
  const back=()=>{ destroy(); setPlaying(false); setSt("idle"); };
  const fresh=()=>{ destroy(); lsSet(ckey,null); setVid(null); setPlaying(false); setSt("idle"); };
  const enableSound=()=>{ try{ ytp.current.unMute(); ytp.current.setVolume(100); ytp.current.playVideo(); }catch(_){} setMuted(false); };
  const cacheGood=(good)=>{ try{ lsSet(ckey,{ids:vid.ids,start:vid.start||0,callIds:vid.callIds||[],good}); }catch(e){} };
  const cacheBlocked=()=>{ try{ lsSet(ckey,{ids:vid.ids,start:vid.start||0,callIds:vid.callIds||[],blocked:true}); }catch(e){} };
  useEffect(()=>{ if(st!=="live"||!vid) return; let dead=false, done=false, wd=null; const s=Math.max(0,parseInt(vid.start)||0);
    const callIds=vid.callIds||[]; const isCall=id=>callIds.includes(id); const bounds=id=> isCall(id)?[0,24]:[s,s+11];
    order.current = (vid.good ? [vid.good, ...vid.ids.filter(x=>x!==vid.good)] : vid.ids.slice()).slice(0,5);
    idx.current=0;
    const settle=()=>{ if(done)return; done=true; if(wd){clearTimeout(wd);wd=null;} const id=order.current[idx.current]; cacheGood(id); setCallNow(isCall(id)); setPlaying(true); };
    const advance=()=>{ if(dead||done)return; idx.current++; if(idx.current>=order.current.length){ cacheBlocked(); setSt("blocked"); return; } arm(); const id=order.current[idx.current]; const [bs,be]=bounds(id); try{ ytp.current.loadVideoById({videoId:id,startSeconds:bs,endSeconds:be}); }catch(e){ setTimeout(advance,0); } };
    const arm=()=>{ if(wd)clearTimeout(wd); wd=setTimeout(advance,3500); };
    const [is0,ie0]=bounds(order.current[0]);
    loadYT().then(YT=>{ if(dead)return; try{ ytp.current=new YT.Player(slot.current,{ width:"100%",height:"100%", videoId:order.current[0],
      playerVars:{start:is0,end:ie0,autoplay:1,mute:1,rel:0,modestbranding:1,playsinline:1},
      events:{ onReady:(e)=>{ try{e.target.playVideo();}catch(_){} },
        onStateChange:(e)=>{ if(e.data===1) settle(); },
        onError:()=>advance() } }); arm(); }catch(e){ cacheBlocked(); setSt("blocked"); } })
      .catch(()=>setSt("blocked"));
    return ()=>{ dead=true; if(wd)clearTimeout(wd); destroy(); };
  },[st,vid]);
  if(st==="live"&&vid){ return (<div className="clipwrap"><div className="clipbox">
      <div id={slot.current} className="ytslot" />
      {playing && callNow && <div className="callbadge">{"🎙️ Commentary call"}</div>}
      {!playing && <div className="clipcover"><span className="sp" />{"Finding a clip that plays…"}</div>}
      {playing && muted && <button className="unmute" onClick={enableSound}>{"🔊 Tap for sound"}</button>}
    </div><button className="cliplink" onClick={back}>↺ reset clip</button></div>); }
  if(st==="blocked"&&vid){ const q=encodeURIComponent(player+" "+home+" "+away+" World Cup 2026 goal highlights"); const url="https://www.youtube.com/results?search_query="+q;
    return (<div className="clipwrap"><a className="ytfallback" href={url} target="_blank" rel="noopener noreferrer"><span className="yp">▶</span><span className="yt2"><b>Find this goal on YouTube</b><span>Opens search results you can watch in your region</span></span></a><button className="cliplink" onClick={fresh}>↺ try a different clip</button></div>); }
  return (<button className="clipbtn" onClick={resolve} disabled={st==="load"}>{st==="load"?"Finding a clip…":st==="none"?"No clip found — tap to retry":(vid&&vid.blocked?"▶ Watch goal · YouTube":vid?"▶ Watch goal · saved":"▶ Watch goal · ~10s in-app")}</button>);
}

function Unlock({onClose,onChange,onMsg}){
  const [code,setCode]=useState("");

  const unlocked=AI_UNLOCKED;

  const relock=()=>{ AI_UNLOCKED=false; lsSet("unlock",0); onMsg&&onMsg("AI features locked"); onChange&&onChange(); onClose(); };
  return (<div className="scrim" onClick={onClose}><div className="sheet" onClick={e=>e.stopPropagation()}>
    <h3>{unlocked?"\ud83d\udd13 AI features unlocked":"\ud83d\udd12 AI features locked"}</h3>
    <p>{unlocked
      ? "AI extras (player bios, goal clips, the Fun reel and Most-Viewed, and AI news) are on for this device. Scores, standings, bracket, stats, lineups and photos always work without AI."
      : "To keep Anthropic usage at zero, AI extras are off by default. Enter the access code to turn them on for this device. Everything else (scores, standings, bracket, stats, lineups, photos) works regardless."}</p>
    {!unlocked && <>
      <label>Access code</label>
      <input type="password" value={code} onChange={e=>setCode(e.target.value)} onKeyDown={e=>{ if(e.key==="Enter")submit(); }} placeholder="Enter code" />
      {msg && <div className="note" style={{marginTop:10}}>{msg}</div>}

    <div className="actions">
      <button className="btn" onClick={onClose}>Close</button>
      {unlocked? <button className="btn" onClick={relock}>Lock again</button> : <button className="btn primary" onClick={submit}>Unlock</button>}
    </div>
  </div></div>);
}
function smsCfg(){ try{ return lsGet("sms")||null; }catch(e){ return null; } }
function SmsAlerts({onClose,favs,themeTeam,onMsg}){
  const init=smsCfg()||{};
  const [numbers,setNumbers]=useState(init.numbers&&init.numbers.length?init.numbers:[""]);
  const [alerts,setAlerts]=useState(init.alerts||{start:true,goal:true,half:true,full:true,red:false});
  const [busy,setBusy]=useState(false);

  const clean=()=>numbers.map(n=>(n||"").replace(/[^\d+]/g,"")).filter(n=>n.replace(/\D/g,"").length>=10);

      setStatus("Subscribed "+nums.length+" number"+(nums.length>1?"s":"")+" for "+teams.length+" team"+(teams.length>1?"s":"")+"."); onMsg&&onMsg("SMS alerts active");
    }catch(e){ setStatus("Couldn't reach the SMS service — check SMS_PROXY and the Worker."); } finally{ setBusy(false); }
  };
  const sendTest=async()=>{
    const nums=clean(); if(!nums.length){ setStatus("Add a number first."); return; }
    if(!SMS_PROXY){ setStatus("No SMS service configured yet (SMS_PROXY is empty)."); return; }
    setBusy(true); setStatus("");

    catch(e){ setStatus("Test failed — check the Worker / SMS gateway setup."); } finally{ setBusy(false); }

      <input type="tel" placeholder="+1 555 123 4567" value={n} onChange={e=>setNum(i,e.target.value)} />
      {numbers.length>1 && <button className="btn sm" onClick={()=>setNumbers(ns=>ns.filter((_,j)=>j!==i))} aria-label="Remove">{"\u2715"}</button>}
    </div>))}
    <button className="btn sm" onClick={()=>setNumbers(ns=>[...ns,""])}>+ Add another number</button>
    <label style={{marginTop:13,display:"block"}}>Alert me about</label>
    <div className="smschips">{A.map(([k,lbl])=><button key={k} className={"smschip"+(alerts[k]?" on":"")} onClick={()=>toggle(k)}>{alerts[k]?"\u2713 ":""}{lbl}</button>)}</div>
    {status && <div className="note" style={{marginTop:11}}>{status}</div>}
    {!SMS_PROXY && <div className="note" style={{marginTop:11}}>Texts require a one-time setup of a Cloudflare Worker + a low-cost SMS gateway (TextBelt — no phone-number rental, self-hostable). See <b>SMS-SETUP.md</b>. Numbers are stored only on this device until then; carrier rates may apply once live.</div>}

function Compare({board, colors}){

  const standings=useMemo(()=>board?safe(()=>deriveStandings(board),[],"deriveStandings"):null,[board]);
  const road=useMemo(()=>board&&standings?safe(()=>roadToR32(board,standings),{},"roadToR32"):null,[board,standings]);
  const scorers=useMemo(()=>board?safe(()=>deriveScorers(board),[],"deriveScorers"):null,[board]);
  const bracketTree=useMemo(()=>board?safe(()=>resolveBracket(buildBracket(),standings||deriveStandings(board),board),null,"bracket"):null,[board,standings]);
  const anyKO=useMemo(()=>(board||[]).some(m=>m.slug&&m.slug!=="group-stage"),[board]);
  const colors=useMemo(()=>board?teamColorMap(board):{},[board]);
  const gsTeams=useMemo(()=>{ const s=new Set(); (board||[]).forEach(m=>{ if(m.slug==="group-stage"){ if(m.home)s.add(m.home); if(m.away)s.add(m.away); } }); return s; },[board]);
  const allTeams=useMemo(()=>[...gsTeams].sort(),[gsTeams]);
  const logoFor=useCallback(t=>{ if(!board||!t||t==="USA 250")return ""; const mm=board.find(m=>m.home===t||m.away===t); return mm?(mm.home===t?mm.homeLogo:mm.awayLogo):""; },[board]);
  const visibleMatches=useMemo(()=>(board||[]).filter(m=>m.slug==="group-stage"||(gsTeams.has(m.home)&&gsTeams.has(m.away))),[board,gsTeams]);
  const days=useMemo(()=>{ const mp={}; visibleMatches.forEach(m=>{ const k=dayKeyOf(m.date); (mp[k]=mp[k]||{key:k,label:dayLabel(m.date),items:[]}).items.push(m); }); return Object.values(mp).sort((a,b)=>a.key-b.key); },[visibleMatches]);
  const liveCount=(board||[]).filter(m=>m.status==="live").length;
  const favNext=useMemo(()=>{ const nextFor=t=>visibleMatches.filter(m=>m.status!=="ft"&&(m.home===t||m.away===t)).sort((a,b)=>new Date(a.date)-new Date(b.date))[0]||null;
    if(themeTeam&&themeTeam!=="USA 250"){ const n=nextFor(themeTeam); if(n)return n; }
    if(favs.size){ const c=visibleMatches.filter(m=>m.status!=="ft"&&[...favs].some(t=>t===m.home||t===m.away)).sort((a,b)=>new Date(a.date)-new Date(b.date)); return c[0]||null; }
    return null; },[themeTeam,favs,visibleMatches]);

  /* apply theme colors */
  useEffect(()=>{ const r=document.documentElement.style; let a="#E2483D",b="#5B8DEF";
    if(themeTeam&&themeTeam!=="USA 250"&&colors[themeTeam]){ const c=colors[themeTeam]; let A=c.color&&c.color.toLowerCase()!=="ffffff"?c.color:(c.alt||"E2483D"); let B=c.alt&&c.alt.toLowerCase()!=="ffffff"?c.alt:(c.color||"5B8DEF"); if(A===B)B="5B8DEF"; a="#"+A; b="#"+B; }
    r.setProperty("--teamA",a); r.setProperty("--teamB",bright(b)); r.setProperty("--teamAink",ink(a));
  },[themeTeam,colors]);

  /* goal alerts */
  const diff=useCallback((nb,favSet)=>{ const idx={}; nb.forEach(m=>{ if(m.homeScore!=null&&m.awayScore!=null) idx[m.id]={h:m.homeScore,a:m.awayScore}; });
    if(!armed.current){ prevRef.current=idx; armed.current=true; return; }
    const prev=prevRef.current||{}; const evs=[];
    nb.forEach(m=>{ if(m.homeScore==null||m.awayScore==null)return; const p=prev[m.id]; if(p){ if(m.homeScore>p.h)evs.push({team:m.home,opp:m.away,score:m.homeScore+"-"+m.awayScore}); if(m.awayScore>p.a)evs.push({team:m.away,opp:m.home,score:m.homeScore+"-"+m.awayScore}); } });
    prevRef.current=idx;
    if(evs.length){ setFlash(f=>f+1); const items=evs.map(ev=>({id:Math.random().toString(36).slice(2),team:ev.team,opp:ev.opp,score:ev.score,fav:favSet.has(ev.team)})); setToasts(t=>[...t,...items]); items.forEach(it=>setTimeout(()=>setToasts(t=>t.filter(x=>x.id!==it.id)),6500));
      try{ if(document.hidden&&"Notification" in window&&Notification.permission==="granted") evs.forEach(ev=>new Notification("⚽ GOAL — "+ev.team,{body:ev.team+" "+ev.score+" vs "+ev.opp})); }catch(e){} }
  },[]);

  const loadBoard=useCallback(async (silent)=>{ if(!silent)setLoad(true); setErr("");
    try{ const b=await espnScoreboard("20260611-20260719"); if(!b.length) throw new Error("No events"); diff(b,favs); setBoard(b); lsSet("board",{data:b,ts:Date.now()}); setUpdated(new Date()); setSource("live"); }
    catch(e){ if(!board) setErr(e.message||"Couldn't load"); }
    finally{ if(!silent)setLoad(false); } },[diff,favs,board]);

  const loadLive=useCallback(async ()=>{ // fast: just today, merge
    try{ const d=new Date(); const ds=d.getFullYear()+String(d.getMonth()+1).padStart(2,"0")+String(d.getDate()).padStart(2,"0");
      const today=await espnScoreboard(ds); if(!today.length)return;
      setBoard(prev=>{ if(!prev)return prev; const map={}; prev.forEach(m=>map[m.id]=m); today.forEach(m=>map[m.id]=m); const merged=Object.values(map); diff(merged,favs); lsSet("board",{data:merged,ts:Date.now()}); return merged; });
      setUpdated(new Date()); setSource("live");
    }catch(e){} },[diff,favs]);

  const loadNews=useCallback(async ()=>{ setNLoad(true); setNErr(""); try{ const items=await fetchNews(); setNews(items); }catch(e){ setNErr(e.message||"Couldn't load news"); } finally{ setNLoad(false); } },[]);

  const openPlayer=useCallback(p=>{ setPlayer(p); setBio(null); },[]);
  const loadBio=useCallback(async ()=>{ if(!player)return; const cached=bioCacheGet(player.name,player.team); if(cached){ setBio(cached); return; } setBioLoad(true); try{ const b=await fetchBio(player.name,player.team); const data=b||{bio:"No extra details found."}; bioCacheSet(player.name,player.team,data); setBio(data); }catch(e){ setBio({bio:"Couldn't load bio."}); } finally{ setBioLoad(false); } },[player]);
  // Prepopulate: when viewing Golden Boot, quietly pre-fetch bios for the top scorers (throttled, cached, skips ones already stored) so opening a player is instant.
  useEffect(()=>{ if(!scorers||!scorers.length||!aiReady())return; let stop=false;
    (async()=>{ for(const s of scorers){ if(stop)return; if(!s.player||bioCacheGet(s.player,s.team))continue; await warmBio(s.player,s.team); await new Promise(r=>setTimeout(r,450)); } })();
    return ()=>{ stop=true; }; },[scorers]);
  // Pre-resolve player photos for the Golden Boot list (ESPN athlete endpoint, cached) so faces show without a flag flash.
  useEffect(()=>{ if(!scorers)return; scorers.forEach(s=>{ if(s.player||s.id) resolveHeadshot(s.id,s.player,s.hs); }); },[scorers]);
  // Background warm: squads + player bios for teams bound for the Round of 32, so taps need no live lookup.
  const boardRef=useRef(board); boardRef.current=board;
  const warmKey=useMemo(()=>standings?standings.map(g=>g.teams.slice(0,PRELOAD_TOPN).map(t=>t.team).join("·")).join("|"):"",[standings]);
  useEffect(()=>{ if(!PRELOAD_BIOS||!aiReady()||!standings) return; let stop=false;
    (async()=>{
      const order=[]; const add=t=>{ if(t&&t!=="USA 250"&&!order.includes(t))order.push(t); };
      if(themeTeam&&themeTeam!=="USA 250") add(themeTeam);
      standings.forEach(g=>g.teams.slice(0,PRELOAD_TOPN).forEach(t=>add(t.team)));
      for(const team of order){ if(stop)return;
        let sq=squadCacheGet(team);
        if(!sq){ sq=await fetchSquadFor(team, boardRef.current); if(sq&&sq.length)squadCacheSet(team,sq); if(stop)return; await sleep(250); }
        for(const p of (sq||[])){ if(stop)return;
          if(!p.name||bioCacheGet(p.name,team))continue;
          await warmBio(p.name,team);
          await sleep(800);
        }
      }
    })();
    return ()=>{ stop=true; }; },[warmKey,themeTeam]);
  const teamPlayer=useCallback((a,team,logo)=>({name:a.displayName,id:a.id,team,logo,hs:a.headshot||"",pos:a.position||"",num:a.jersey||"",goals:0}),[]);


  /* mount */
  useEffect(()=>{ const c=lsGet("board"); if(c){ setBoard(c.data); setUpdated(new Date(c.ts)); setSource("cached"); prevRef.current=null; } loadBoard(); // eslint-disable-next-line
  },[]);
  useEffect(()=>{ if(tab==="news"&&!loadedNews.current){ loadedNews.current=true; loadNews(); } },[tab,loadNews]);

  /* smart polling */
  useEffect(()=>{ if(!auto)return; const ms=liveCount>0?12000:120000; const id=setInterval(()=>{ if(!document.hidden){ liveCount>0?loadLive():loadBoard(true); } },ms); return ()=>clearInterval(id); },[auto,liveCount,loadLive,loadBoard]);
  useEffect(()=>{ const v=()=>{ if(!document.hidden) loadLive(); }; document.addEventListener("visibilitychange",v); const t=setInterval(()=>force(x=>x+1),1000); return ()=>{ document.removeEventListener("visibilitychange",v); clearInterval(t); }; },[loadLive]);

  /* default selected day = today or nearest */
  useEffect(()=>{ if(!days.length||dayKey!=null)return; const d=new Date(); const tk=d.getFullYear()*10000+(d.getMonth()+1)*100+d.getDate(); let best=days[0].key, bestDiff=Infinity; days.forEach(x=>{ const diff=Math.abs(x.key-tk); if(diff<bestDiff){bestDiff=diff;best=x.key;} }); setDayKey(best); },[days,dayKey]);

  const dayIdx=days.findIndex(d=>d.key===dayKey);
  const curDay=dayIdx>=0?days[dayIdx]:null;
  let dayItems=curDay?curDay.items:[]; if(onlyFav) dayItems=dayItems.filter(m=>favs.has(m.home)||favs.has(m.away));
  dayItems=dayItems.slice().sort((a,b)=>{ const fa=(favs.has(a.home)||favs.has(a.away))?0:1, fb=(favs.has(b.home)||favs.has(b.away))?0:1; return fa-fb || new Date(a.date)-new Date(b.date); });

  const detailMatch=detailId&&board?board.find(m=>m.id===detailId):null;
  const detailLive=!!(detailMatch&&detailMatch.status==="live");
  useEffect(()=>{ if(!detailId||!detailLive)return; const id=setInterval(()=>{ if(!document.hidden) loadLive(); },5000); return ()=>clearInterval(id); },[detailId,detailLive,loadLive]);
  const teamInfoObj=team&&board?teamInfo(board,team):null;

  const stageLabel=Date.now()<GROUP_END?"Group Stage":(Date.now()<FINAL_DATE?"Knockout Stage":"Tournament");
  const heroCd=Date.now()<R32_DATE?countdown(R32_DATE):countdown(FINAL_DATE);
  const heroCdLabel=Date.now()<R32_DATE?"Round of 32 in":"Final in";

  return (
    <div className="wrap">
      <div className="stripebar" />
      <div className="top">
        <div className="brand"><div><div className="eyebrow">FIFA World Cup · USA 250</div><h1>2026</h1><div className="hosts">United States · Canada · México</div></div>{themeTeam&&themeTeam!=="USA 250" && <div className="favbadge" title={"Following "+themeTeam}><Mark name={themeTeam} logo={logoFor(themeTeam)} big={true} /><span><small>Following</small>{themeTeam}</span></div>}</div>
        <div className="ctrls">
          <div className="updated">{updated?<span>Updated <b>{rel(updated.getTime())}</b></span>:<span>Loading…</span>}
            <span className={"pillstat "+(source==="cached"?"cache":source==="live"?"ok":"dim")}>{source==="cached"?"Cached":source==="live"?"Live":"—"}</span></div>
          <div className="btnrow">
            <select className="selmini" value={themeTeam} onChange={e=>setFavoriteTeam(e.target.value)} title="Pick your favorite team — follows it and themes the app">
              <option value="USA 250">★ Favorite: USA 250</option>{allTeams.map(t=><option key={t} value={t}>★ {t}</option>)}
            </select>
            <button className={"toggle"+(auto?" on":"")} onClick={()=>setAuto(a=>!a)} aria-pressed={auto} title="Auto-refresh live data"><span className="sw" />Auto</button>
            <AlertBell onMsg={pushToast} />
            <button className="btn sm" onClick={()=>setSmsOpen(true)} title="SMS match alerts for your followed teams">{"\ud83d\udcf1"}</button>
            <button className="btn sm" onClick={()=>setUnlockOpen(true)} title="AI access (locked by default)">{AI_UNLOCKED?"\ud83d\udd13":"\ud83d\udd12"}</button>
            <button className="btn sm" onClick={()=>{ const fl=new Set([...favs,themeTeam].filter(Boolean)); const ms=visibleMatches.filter(m=>m.status==="upcoming"&&(fl.size?(fl.has(m.home)||fl.has(m.away)):true)); if(!ms.length){ pushToast("No upcoming matches to export"); return; } downloadICS(ms, fl.size?"My World Cup teams":"World Cup 2026"); pushToast("Calendar (.ics) downloaded"); }} title="Add upcoming matches (your teams) to your calendar">{"\ud83d\udcc5"}</button>
            {!PROXY && <button className="btn sm" onClick={()=>setSettings(true)}>⚙</button>}
            <button className="btn primary" disabled={load} onClick={()=>loadBoard()}>↻</button>
          </div>
        </div>
      </div>

      <div className="hero">
        <div>{liveCount>0?<span className="live"><span className="dot" />{liveCount} LIVE NOW</span>:<span className="stage">{stageLabel} · <b>{curDay?curDay.items.length+" matches "+(dayIdx===days.findIndex(d=>d.key===(new Date().getFullYear()*10000+(new Date().getMonth()+1)*100+new Date().getDate()))?"today":"that day"):"loading"}</b></span>}</div>
        {heroCd && <Countdown label={heroCdLabel} cd={heroCd} />}
      </div>

      <div className="tabs">
        <button className={"tab"+(tab==="matches"?" active":"")} onClick={()=>setTab("matches")}>Matches{liveCount>0 && <span className="badge">{liveCount}</span>}</button>
        <button className={"tab"+(tab==="standings"?" active":"")} onClick={()=>setTab("standings")}>Standings</button>
        <button className={"tab"+(tab==="bracket"?" active":"")} onClick={()=>setTab("bracket")}>Bracket</button>
        <button className={"tab"+(tab==="stats"?" active":"")} onClick={()=>setTab("stats")}>Golden Boot</button>
        <button className={"tab"+(tab==="pickem"?" active":"")} onClick={()=>setTab("pickem")}>Pick'em</button>
        <button className={"tab"+(tab==="compare"?" active":"")} onClick={()=>setTab("compare")}>Compare</button>
        <button className={"tab"+(tab==="news"?" active":"")} onClick={()=>setTab("news")}>News</button>
        <button className={"tab"+(tab==="fun"?" active":"")} onClick={()=>setTab("fun")}>Fun</button>
      </div>

      {board && <LiveTicker board={board} onMatch={setDetailId} />}

      {err && !board && <div className="banner"><span>Couldn't reach the live feed — {err}</span><button className="btn" onClick={()=>loadBoard()}>Try again</button></div>}
      {board===null && !err && <Loader label="Loading the tournament…" />}

      {board && tab==="matches" && (<div>
        {favNext && favNext.status!=="live" && (()=>{ const ft=favs.has(favNext.home)?favNext.home:favNext.away; const opp=ft===favNext.home?favNext.away:favNext.home; const oppLogo=ft===favNext.home?favNext.awayLogo:favNext.homeLogo; const ftLogo=ft===favNext.home?favNext.homeLogo:favNext.awayLogo; const cd=countdown(new Date(favNext.date).getTime());
          return (<div className="favcd" onClick={()=>setDetailId(favNext.id)} role="button" tabIndex={0}>
            <span className="fteam"><Mark name={ft} logo={ftLogo} big={true} />{ft}</span>
            <span className="fopp">{favNext.status==="live"?"playing now":"next match"} · vs <Mark name={opp} logo={oppLogo} /> {opp}<br/>{new Date(favNext.date).toLocaleString("en-US",{weekday:"short",month:"short",day:"numeric",hour:"numeric",minute:"2-digit"})}</span>
            {favNext.status==="live"?<span className="units"><span className="live-pill" style={{fontSize:14}}><span className="dot" />LIVE</span></span>:cd&&<span className="units">{cd.days>0&&<span className="cunit"><b>{cd.days}</b><span>d</span></span>}<span className="cunit"><b>{String(cd.h).padStart(2,"0")}</b><span>hr</span></span><span className="cunit"><b>{String(cd.m).padStart(2,"0")}</b><span>min</span></span><span className="cunit"><b>{String(cd.s).padStart(2,"0")}</b><span>sec</span></span></span>}
          </div>); })()}
        {favs.size>0 && <div className="filterbar"><button className={"chip"+(onlyFav?" on":"")} onClick={()=>setOnlyFav(v=>!v)}>★ Following only ({favs.size})</button></div>}
        {days.length>0 && <div className="datenav">
          <button onClick={()=>dayIdx>0&&setDayKey(days[dayIdx-1].key)} disabled={dayIdx<=0} aria-label="Previous day">‹</button>
          <span className="dl">{curDay?curDay.label:""}</span>
          <span className="dc">{dayItems.length} match{dayItems.length!==1?"es":""}</span>
          <button onClick={()=>dayIdx<days.length-1&&setDayKey(days[dayIdx+1].key)} disabled={dayIdx>=days.length-1} aria-label="Next day">›</button>
        </div>}
        {dayItems.length===0 ? <div className="empty"><h3>No matches{onlyFav?" for your teams":""} this day</h3><p>Use the arrows to browse other matchdays.</p></div>
          : <div className="matches">{dayItems.map(m=><MatchCard key={m.id} m={m} onTeam={setTeam} onOpen={mm=>setDetailId(mm.id)} favs={favs} toggleFav={toggleFav} />)}</div>}
      </div>)}

      {board && tab==="standings" && (<div>
        <div className="legend"><span><i style={{background:"var(--gold)"}} />Top 2 — advance to Round of 32</span><span><i style={{background:"var(--teamB)"}} />3rd — best-third race</span><span><span className="host" style={{marginRight:7}}>H</span>Host</span></div>
        {standings&&standings.length>0?<div className="groups">{standings.map(g=><div key={g.group} className="grpwrap"><GroupCard g={g} onTeam={setTeam} /><RoadCard road={road&&road[g.group]} group={g.group} onTeam={setTeam} fav={themeTeam&&themeTeam!=="USA 250"?themeTeam:null} /></div>)}</div>:<div className="empty"><h3>Standings build as games finish</h3><p>Group tables populate from completed results.</p></div>}
        {standings&&standings.length>0 && <div className="note" style={{marginTop:16}}>🧭 Road to the Round of 32 brute-forces every remaining group result. Top 2 advance automatically; the 8 best 3rd-place teams across all groups also qualify, so a “3rd race+” team isn’t guaranteed yet. Goal-difference tiebreakers are simplified — treat it as a projection, not a guarantee.</div>}
      </div>)}

      {board && tab==="bracket" && (<div>
        <div className="projbanner"><span className="tag">{anyKO?"Live":"Projected"}</span><p>{anyKO?"The knockout bracket — winners advance to the right. Tap any team for details.":"The knockout bracket (Round of 32 → Final). Each seed locks once that group is decided; until then it shows the current projected qualifier (\u201cproj.\u201d). Group games — like the USA's next match — are on the Matches tab."}</p>{!anyKO&&countdown(R32_DATE)&&<Countdown label="Bracket locks in" cd={countdown(R32_DATE)} />}</div>
        <PathToFinal tree={bracketTree} standings={standings} team={themeTeam&&themeTeam!=="USA 250"?themeTeam:null} onTeam={setTeam} />
        <div className="btree">
          <div className="bhead">{ROUND_NAMES.map((n,i)=><div className="bh" key={n} style={{flex:"0 0 "+(i===ROUND_NAMES.length-1?202:224)+"px"}}>{n}</div>)}</div>
          <div className="binner">{bracketTree&&<BNode node={bracketTree} onTeam={setTeam} />}</div>
        </div>
      </div>)}

      {board && tab==="stats" && (<div>
        {scorers&&scorers.length>0?<div>
          <div className="gbhead"><div className="gblead"><span className="gbcrown">👑</span><div><b>{scorers[0].player}</b><span className="gbsub">{scorers[0].team} · leads with {scorers[0].goals} goal{scorers[0].goals!==1?"s":""}</span></div></div><div className="gbtot">{board.reduce((n,mm)=>n+((mm.details||[]).filter(d=>d.scoringPlay).length),0)}<small>goals so far</small></div></div>
          <div className="scorers">{scorers.map((s,i)=>(<div className={"scorer"+(i<3?" top":"")} key={i}>
          <span className="rk">{i+1}</span><Headshot id={s.id} hs={s.hs} name={s.player} team={s.team} logo={s.logo} cls="hs" />
          <div className="who"><div className="nm"><button className="teamlink" onClick={()=>openPlayer({name:s.player,id:s.id,team:s.team,logo:s.logo,hs:s.hs,goals:s.goals,pos:"",num:""})}>{s.player}</button></div><div className="tm"><Mark name={s.team} logo={s.logo} /><span>{s.team}</span></div><div className="grace"><span style={{width:(scorers[0].goals?Math.max(6,Math.round(s.goals/scorers[0].goals*100)):0)+"%"}} /></div></div>
          <span className="gls">{s.goals}<small>goals</small></span></div>))}</div></div>
        :<div className="empty"><h3>No goals logged yet</h3><p>The Golden Boot race fills in as goals are scored.</p></div>}
        {(()=>{ const assists=deriveAssists(board), cs=cleanSheets(board), disc=deriveDiscipline(board), gbm=goalsByMinute(board); const gmax=Math.max(1,...gbm); const labels=["1-15","16-30","31-45","46-60","61-75","76-90+"];
          const anyGbm=gbm.some(v=>v>0);
          return (<>
            {anyGbm && <div className="statsec"><div className="sech">Goals by minute</div><div className="gbm">{gbm.map((v,i)=><div className="gbmbar" key={i}><span className="gbmn">{v}</span><div className="gbmfill" style={{height:(v/gmax*100)+"%"}} /><span className="gbmx">{labels[i]}</span></div>)}</div></div>}
            {assists.length>0 && <div className="statsec"><div className="sech">Top assists</div><div className="scard">{assists.map((a,i)=><div className="srow" key={i}><span className="srk">{i+1}</span><Headshot id={a.id} hs="" name={a.player} team={a.team} logo={a.logo} cls="hs" /><span className="snm">{a.player}</span><span className="stm"><Mark name={a.team} logo={a.logo} />{a.team}</span><span className="sval">{a.assists}</span></div>)}</div></div>}
            {cs.length>0 && <div className="statsec"><div className="sech">Clean sheets</div><div className="scard">{cs.map((t,i)=><div className="srow" key={i}><span className="srk">{i+1}</span><Mark name={t.team} logo={t.logo} /><span className="snm">{t.team}</span><span className="stm">{t.played} played</span><span className="sval">{t.cs}</span></div>)}</div></div>}
            {disc.length>0 && <div className="statsec"><div className="sech">Discipline</div><div className="scard">{disc.map((t,i)=><div className="srow" key={i}><span className="srk">{i+1}</span><Mark name={t.team} logo={t.logo} /><span className="snm">{t.team}</span><span className="stm">{"\ud83d\udfe8 "+t.yc+"\u2003\ud83d\udfe5 "+t.rc}</span></div>)}</div></div>}
          </>); })()}
      </div>)}

      {board && tab==="pickem" && <PickEm board={board} matches={visibleMatches} onForce={()=>force(x=>x+1)} pushToast={pushToast} />}
      {board && tab==="compare" && <Compare board={board} colors={colors} />}

      {tab==="news" && (<div>
        {nErr && <div className="banner"><span>Couldn't load news — {nErr}</span><button className="btn" onClick={loadNews}>Try again</button></div>}
        {news===null && !nErr && <Loader label="Fetching the latest headlines…" />}
        {news&&news.length>0 && <div className="newslist">{news.map((n,i)=>(<div className="newsitem" key={i}><h4>{n.link?<a href={n.link} target="_blank" rel="noopener noreferrer">{n.title}</a>:n.title}</h4>{n.summary&&<p>{n.summary}</p>}<div className="src">{n.source||"ESPN"}{n.time?(" · "+n.time):""}</div></div>))}</div>}
        {news&&news.length===0&&!nErr && <div className="empty"><h3>No headlines right now</h3><p>Try again shortly.</p></div>}
        {nLoad&&news!==null && <div style={{textAlign:"center",color:"var(--mut)",fontSize:13,marginTop:18}}>Refreshing…</div>}
      </div>)}


      {tab==="fun" && <FunTab clips={funClips} onRefresh={refreshFun} busy={funBusy} onMostViewed={loadMostViewed} mvBusy={mvBusy} />}

      <footer><span>Live data: ESPN public feed · Original USA‑250 theme (not an official mark)</span><span>Final at MetLife Stadium, NJ · Jul 19 · <b style={{cursor:"default"}} onClick={()=>{ dbgTaps.current+=1; if(dbgTaps.current>=5 && !DIAG.on){ DIAG.on=true; lsSet("debug",1); force(x=>x+1); } }}>{BUILD}</b></span></footer>

      {team && teamInfoObj && <Boundary compact label="team"><TeamModal info={teamInfoObj} standings={standings} onClose={()=>setTeam(null)} fav={favs.has(team)} toggleFav={toggleFav} onPlayer={openPlayer} setTheme={setFavoriteTeam} themeTeam={themeTeam} onMatch={(id)=>{ setTeam(null); setDetailId(id); }} /></Boundary>}
      {player && <Boundary compact label="player"><PlayerModal player={player} goals={board?playerGoals(board,player.id,player.name):[]} bio={bio} bioLoad={bioLoad} onBio={loadBio} onClose={()=>{ setPlayer(null); setBio(null); }} onTeam={(t)=>{ setPlayer(null); setTeam(t); }} /></Boundary>}
      {detailMatch && <Boundary compact label="match"><MatchModal m={detailMatch} onClose={()=>setDetailId(null)} onPlayer={openPlayer} onTeam={(t)=>{ setDetailId(null); setTeam(t); }} teamPlayer={teamPlayer} board={board} standings={standings} /></Boundary>}
      {settings && <Settings onClose={()=>setSettings(false)} onSaved={()=>force(x=>x+1)} />}
      {smsOpen && <SmsAlerts onClose={()=>setSmsOpen(false)} favs={favs} themeTeam={themeTeam} onMsg={pushToast} />}
      {unlockOpen && <Unlock onClose={()=>setUnlockOpen(false)} onChange={()=>force(x=>x+1)} onMsg={pushToast} />}

      {flash>0 && <div className="flash" key={flash} />}
      <div className="toasts">{toasts.map(t=>(<div className={"toast"+(t.fav?" fav":"")} key={t.id}>{t.msg?<div className="ms">{t.msg}</div>:<><div className="gl">{t.fav?"★ Goal":"Goal"}</div><div className="ms">{t.team} {t.score} <span style={{color:"var(--mut)",fontWeight:600}}>vs {t.opp}</span></div></>}</div>))}</div>
      <DebugPanel />
    </div>
  );
}
ReactDOM.createRoot(document.getElementById("root")).render(<Boundary><App /></Boundary>);
</script>
</body>
</html>
