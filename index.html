<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
<meta name="description" content="Live 2026 FIFA World Cup dashboard — scores, standings, bracket, Golden Boot, news and AI predictions." />
<meta name="color-scheme" content="dark" />
<meta name="theme-color" content="#081230" />
<meta name="mobile-web-app-capable" content="yes" />
<meta name="apple-mobile-web-app-capable" content="yes" />
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
<meta name="apple-mobile-web-app-title" content="WC 2026" />
<link rel="icon" href="data:image/svg+xml,%3Csvg%20xmlns%3D%22http%3A%2F%2Fwww.w3.org%2F2000%2Fsvg%22%20viewBox%3D%220%200%20100%20100%22%3E%3Crect%20width%3D%22100%22%20height%3D%22100%22%20rx%3D%2220%22%20fill%3D%22%23081230%22%2F%3E%3Ccircle%20cx%3D%2250%22%20cy%3D%2250%22%20r%3D%2234%22%20fill%3D%22%230B1B40%22%20stroke%3D%22%23F2C14E%22%20stroke-width%3D%223%22%2F%3E%3Cpath%20d%3D%22M50%2022l3%209h9l-7%206%203%209-8-5-8%205%203-9-7-6h9z%22%20fill%3D%22%23F4F7FD%22%2F%3E%3Cpath%20d%3D%22M18%2056a32%2032%200%200%200%2064%200z%22%20fill%3D%22%23E2483D%22%2F%3E%3Ccircle%20cx%3D%2250%22%20cy%3D%2250%22%20r%3D%228%22%20fill%3D%22%230B1B40%22%20stroke%3D%22%23F4F7FD%22%20stroke-width%3D%221.6%22%2F%3E%3C%2Fsvg%3E" />
<link rel="apple-touch-icon" href="data:image/svg+xml,%3Csvg%20xmlns%3D%22http%3A%2F%2Fwww.w3.org%2F2000%2Fsvg%22%20viewBox%3D%220%200%20100%20100%22%3E%3Crect%20width%3D%22100%22%20height%3D%22100%22%20rx%3D%2220%22%20fill%3D%22%23081230%22%2F%3E%3Ccircle%20cx%3D%2250%22%20cy%3D%2250%22%20r%3D%2234%22%20fill%3D%22%230B1B40%22%20stroke%3D%22%23F2C14E%22%20stroke-width%3D%223%22%2F%3E%3Cpath%20d%3D%22M50%2022l3%209h9l-7%206%203%209-8-5-8%205%203-9-7-6h9z%22%20fill%3D%22%23F4F7FD%22%2F%3E%3Cpath%20d%3D%22M18%2056a32%2032%200%200%200%2064%200z%22%20fill%3D%22%23E2483D%22%2F%3E%3Ccircle%20cx%3D%2250%22%20cy%3D%2250%22%20r%3D%228%22%20fill%3D%22%230B1B40%22%20stroke%3D%22%23F4F7FD%22%20stroke-width%3D%221.6%22%2F%3E%3C%2Fsvg%3E" />
<title>World Cup 2026 — Live</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Anton&family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
<script crossorigin src="https://cdnjs.cloudflare.com/ajax/libs/react/18.3.1/umd/react.production.min.js"></script>
<script crossorigin src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.3.1/umd/react-dom.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.28.4/babel.min.js"></script>
<style>
  :root{
    --navy:#081230; --navy2:#0B1B40; --panel:#0E2150; --panel2:#15306A;
    --line:#22386C; --line2:#33508F;
    --ink:#F4F7FD; --mut:#9DB0D6; --mut2:#6B7DA8;
    --live:#FF4257; --gold:#F2C14E; --white:#F4F7FD;
    --teamA:#E2483D; --teamAink:#ffffff; --teamB:#5B8DEF;
    --shadow:0 18px 50px -22px rgba(0,0,0,.85);
  }
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
  html{-webkit-text-size-adjust:100%;text-size-adjust:100%}
  html,body{margin:0;padding:0}
  body{
    font-family:'Inter',system-ui,sans-serif;color:var(--ink);
    background:
      radial-gradient(900px 460px at 50% -6%, rgba(91,141,239,.14), transparent 62%),
      radial-gradient(2px 2px at 12% 18%, rgba(255,255,255,.22), transparent 40%),
      radial-gradient(2px 2px at 78% 9%, rgba(255,255,255,.16), transparent 40%),
      radial-gradient(1.5px 1.5px at 34% 6%, rgba(255,255,255,.18), transparent 40%),
      linear-gradient(180deg, var(--navy) 0%, #060D24 100%);
    background-attachment:fixed;
    min-height:100vh;min-height:100dvh;-webkit-font-smoothing:antialiased;
  }
  .wrap{max-width:1180px;margin:0 auto;padding:22px 20px 80px;
    padding-left:max(20px,env(safe-area-inset-left));padding-right:max(20px,env(safe-area-inset-right));
    padding-top:max(22px,env(safe-area-inset-top));padding-bottom:max(80px,calc(env(safe-area-inset-bottom) + 60px))}
  .stripebar{height:4px;border-radius:4px;margin-bottom:18px;background:linear-gradient(90deg,var(--teamA),var(--white) 50%,var(--teamA));opacity:.9}

  .top{display:flex;justify-content:space-between;align-items:flex-end;gap:20px;flex-wrap:wrap;padding-bottom:16px}
  .brand{display:flex;align-items:center;gap:15px}
  .brand .eyebrow{font-size:11px;letter-spacing:.3em;text-transform:uppercase;color:var(--gold);font-weight:700}
  .brand h1{font-family:'Anton',sans-serif;font-weight:400;margin:1px 0 3px;line-height:.84;font-size:clamp(40px,8vw,72px);letter-spacing:.01em;
    background:linear-gradient(180deg,#fff 35%,#cdddff 75%,var(--teamB));-webkit-background-clip:text;background-clip:text;color:transparent}
  .brand .hosts{font-size:11px;letter-spacing:.2em;text-transform:uppercase;color:var(--mut);font-weight:600}
  .ctrls{display:flex;flex-direction:column;align-items:flex-end;gap:10px}
  .updated{font-size:12px;color:var(--mut);display:flex;align-items:center;gap:8px;flex-wrap:wrap;justify-content:flex-end}
  .updated b{color:var(--ink);font-weight:600}
  .btnrow{display:flex;gap:8px;align-items:center;flex-wrap:wrap;justify-content:flex-end}
  .btn{font-family:inherit;font-size:13px;font-weight:600;color:var(--ink);background:var(--panel);border:1px solid var(--line2);border-radius:10px;padding:9px 14px;cursor:pointer;transition:.15s;display:inline-flex;align-items:center;gap:7px}
  .btn:hover{background:var(--panel2);border-color:var(--teamB)}
  .btn:focus-visible{outline:2px solid var(--teamB);outline-offset:2px}
  .btn.primary{background:var(--teamA);color:var(--teamAink);border-color:var(--teamA)}
  .btn.primary:hover{filter:brightness(1.08)}
  .btn[disabled]{opacity:.5;cursor:default}
  .btn.sm{padding:7px 10px;font-size:12px}
  .selmini{font-family:inherit;font-size:16px;background:var(--panel);border:1px solid var(--line2);color:var(--ink);border-radius:10px;padding:8px 10px;cursor:pointer;max-width:160px}
  .selmini:focus{outline:2px solid var(--teamB)}
  .toggle{display:inline-flex;align-items:center;gap:8px;font-size:12px;color:var(--mut);font-weight:600;cursor:pointer;user-select:none;background:none;border:0}
  .sw{width:38px;height:22px;border-radius:20px;background:var(--line);position:relative;transition:.18s;border:1px solid var(--line2)}
  .sw::after{content:"";position:absolute;top:2px;left:2px;width:16px;height:16px;border-radius:50%;background:var(--mut);transition:.18s}
  .toggle.on .sw{background:rgba(226,72,61,.30);background:color-mix(in srgb, var(--teamA) 35%, transparent);border-color:var(--teamA)}
  .toggle.on .sw::after{left:18px;background:var(--teamA)}
  .pillstat{font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.06em;padding:4px 9px;border-radius:20px}
  .pillstat.ok{color:var(--teamB);background:rgba(91,141,239,.16);background:color-mix(in srgb,var(--teamB) 16%,transparent);border:1px solid rgba(91,141,239,.4);border:1px solid color-mix(in srgb,var(--teamB) 40%,transparent)}
  .pillstat.dim{color:var(--mut);background:var(--panel2);border:1px solid var(--line)}
  .pillstat.cache{color:var(--gold);background:rgba(242,193,78,.12);border:1px solid rgba(242,193,78,.35)}

  .hero{display:flex;justify-content:space-between;align-items:center;gap:16px;flex-wrap:wrap;background:linear-gradient(120deg,var(--panel),var(--navy2));border:1px solid var(--line);border-radius:14px;padding:13px 18px;margin-bottom:18px;position:relative;overflow:hidden}
  .hero::after{content:"";position:absolute;right:-30px;top:-30px;width:160px;height:160px;background:radial-gradient(circle,rgba(226,72,61,.18),transparent 70%);background:radial-gradient(circle,color-mix(in srgb,var(--teamA) 20%,transparent),transparent 70%);pointer-events:none}
  .hero .live{display:inline-flex;align-items:center;gap:10px;font-family:'Anton',sans-serif;font-size:20px;letter-spacing:.02em}
  .hero .live .dot{width:10px;height:10px;border-radius:50%;background:var(--live);box-shadow:0 0 0 0 rgba(255,66,87,.7);animation:pulse 1.5s infinite}
  .hero .stage{font-size:13px;color:var(--mut);font-weight:600}
  .hero .stage b{color:var(--ink)}
  .cdown{display:flex;align-items:center;gap:10px;font-size:13px;color:var(--mut);font-weight:600}
  .cdown .units{display:flex;gap:6px}
  .cunit{background:var(--navy);border:1px solid var(--line2);border-radius:8px;padding:5px 8px;text-align:center;min-width:42px}
  .cunit b{display:block;font-family:'Anton',sans-serif;font-size:18px;color:var(--ink);line-height:1}
  .cunit span{font-size:9px;text-transform:uppercase;letter-spacing:.1em;color:var(--mut2)}

  .tabs{display:flex;gap:4px;margin:0 0 16px;background:var(--panel);border:1px solid var(--line);border-radius:13px;padding:5px;width:fit-content;max-width:100%;flex-wrap:wrap}
  .tab{font-family:inherit;font-size:13px;font-weight:700;letter-spacing:.03em;text-transform:uppercase;color:var(--mut);background:transparent;border:0;border-radius:9px;padding:10px 16px;cursor:pointer;transition:.15s}
  .tab:hover{color:var(--ink)}
  .tab.active{background:var(--panel2);color:var(--ink);box-shadow:inset 0 0 0 1px var(--line2)}
  .tab:focus-visible{outline:2px solid var(--teamB);outline-offset:2px}
  .tab .badge{display:inline-block;margin-left:7px;background:var(--live);color:#fff;font-size:10px;border-radius:20px;padding:1px 6px;vertical-align:1px}

  .filterbar{display:flex;align-items:center;gap:10px;margin:0 0 16px;flex-wrap:wrap}
  .chip{font-size:12px;font-weight:700;color:var(--mut);background:var(--panel);border:1px solid var(--line2);border-radius:20px;padding:7px 13px;cursor:pointer;display:inline-flex;align-items:center;gap:7px}
  .chip.on{color:var(--gold);border-color:var(--gold);background:rgba(242,193,78,.1)}
  .chip:focus-visible{outline:2px solid var(--teamB);outline-offset:2px}

  .datenav{display:flex;align-items:center;gap:12px;margin:0 0 16px}
  .datenav button{background:var(--panel);border:1px solid var(--line2);color:var(--ink);border-radius:10px;width:36px;height:36px;cursor:pointer;font-size:16px;flex:none}
  .datenav button:hover{border-color:var(--teamB)} .datenav button[disabled]{opacity:.4;cursor:default}
  .datenav .dl{font-size:14px;letter-spacing:.08em;text-transform:uppercase;color:var(--ink);font-weight:700;flex:1}
  .datenav .dc{font-size:12px;color:var(--mut);font-weight:600}

  .matches{display:grid;grid-template-columns:repeat(auto-fill,minmax(290px,1fr));gap:14px}
  .match{background:var(--panel);border:1px solid var(--line);border-radius:14px;padding:14px 16px;position:relative;overflow:hidden}
  .match.fav{box-shadow:inset 3px 0 0 var(--gold)}
  .match .meta{display:flex;justify-content:space-between;align-items:center;font-size:11px;color:var(--mut);text-transform:uppercase;letter-spacing:.08em;font-weight:600;margin-bottom:10px}
  .grp{display:inline-flex;align-items:center;justify-content:center;height:22px;padding:0 10px;border-radius:7px;background:var(--panel2);border:1px solid var(--line2);color:var(--teamB);font-weight:800;font-size:11.5px;letter-spacing:.06em;white-space:nowrap}
  .kotime{font-size:12px;color:var(--mut);font-weight:600}
  .row{display:flex;align-items:center;justify-content:space-between;gap:10px;padding:3px 0}
  .team{display:flex;align-items:center;gap:9px;font-weight:600;font-size:15px;min-width:0}
  .mark{width:20px;height:20px;object-fit:contain;flex:none}
  .markbig{width:30px;height:30px;object-fit:contain;flex:none}
  .teamlink{background:none;border:0;color:inherit;font:inherit;font-weight:600;cursor:pointer;padding:0;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:158px;text-align:left}
  .teamlink:hover{color:var(--teamB)}
  .teamlink:focus-visible{outline:2px solid var(--teamB);outline-offset:2px;border-radius:4px}
  .score{font-family:'Anton',sans-serif;font-size:30px;line-height:1;min-width:30px;text-align:right;letter-spacing:.02em}
  .match.win .team.lose .teamlink,.match.win .team.lose .mark{opacity:.5}
  .status{margin-top:10px;padding-top:10px;border-top:1px solid var(--line);display:flex;align-items:center;justify-content:space-between;font-size:12px;color:var(--mut);font-weight:600;gap:8px}
  .live-pill{display:inline-flex;align-items:center;gap:7px;color:var(--live);font-weight:800;text-transform:uppercase;letter-spacing:.06em}
  .dot{width:8px;height:8px;border-radius:50%;background:var(--live);box-shadow:0 0 0 0 rgba(255,66,87,.7);animation:pulse 1.5s infinite}
  .match.islive{border-color:rgba(255,66,87,.55);box-shadow:0 0 30px -12px rgba(255,66,87,.55)}
  .match.clickable{cursor:pointer;transition:.14s}
  .match.clickable:hover{border-color:var(--line2);transform:translateY(-2px)}
  .match.clickable:focus-visible{outline:2px solid var(--teamB);outline-offset:2px}
  .cardcta{width:100%;margin-top:11px;padding:9px;border-radius:9px;border:1px solid var(--line2);background:var(--panel2);color:var(--ink);font-family:inherit;font-weight:700;font-size:12.5px;cursor:pointer;transition:.14s}
  .cardcta:hover{border-color:var(--teamB)}
  .cardcta.live{background:var(--live);border-color:var(--live);color:#fff;animation:ctapulse 2s infinite}
  .cardcta.rev{background:var(--navy);border-color:var(--line2)}
  @keyframes ctapulse{0%,100%{box-shadow:0 0 0 0 rgba(255,66,87,.45)}50%{box-shadow:0 0 14px 0 rgba(255,66,87,.55)}}
  .following{font-size:10px;color:var(--gold);font-weight:800;letter-spacing:.04em}
  .ft{color:var(--mut2)} .ko{color:var(--teamB)}
  .detailbtn{background:none;border:0;color:var(--teamB);font:inherit;font-weight:700;cursor:pointer;font-size:12px}
  .detailbtn:hover{text-decoration:underline}
  @keyframes pulse{0%{box-shadow:0 0 0 0 rgba(255,66,87,.6)}70%{box-shadow:0 0 0 9px rgba(255,66,87,0)}100%{box-shadow:0 0 0 0 rgba(255,66,87,0)}}

  .star{background:none;border:0;color:var(--mut2);cursor:pointer;font-size:16px;line-height:1;padding:0 2px;transition:.12s}
  .star:hover{color:var(--gold)} .star.on{color:var(--gold)}
  .star:focus-visible{outline:2px solid var(--teamB);outline-offset:2px;border-radius:4px}

  .groups{display:grid;grid-template-columns:repeat(auto-fill,minmax(330px,1fr));gap:16px}
  .gcard{background:var(--panel);border:1px solid var(--line);border-radius:14px;overflow:hidden}
  .ghead{display:flex;align-items:center;gap:11px;padding:13px 16px;border-bottom:1px solid var(--line);background:linear-gradient(180deg,var(--panel2),transparent)}
  .gbadge{font-family:'Anton',sans-serif;font-size:20px;width:34px;height:34px;border-radius:9px;display:flex;align-items:center;justify-content:center;background:var(--navy);border:1px solid var(--line2);color:var(--teamB)}
  .ghead .lbl{font-size:12px;letter-spacing:.14em;text-transform:uppercase;color:var(--mut);font-weight:700}
  table{width:100%;border-collapse:collapse;font-size:13px}
  thead th{font-size:10px;letter-spacing:.06em;text-transform:uppercase;color:var(--mut2);font-weight:700;text-align:center;padding:9px 4px}
  thead th.t{text-align:left;padding-left:16px}
  tbody td{padding:9px 4px;text-align:center;border-top:1px solid var(--line)}
  tbody td.t{text-align:left;padding-left:12px;font-weight:600}
  tbody td.pts{font-weight:800;color:var(--ink)}
  .pos{display:inline-block;width:18px;color:var(--mut)}
  tr.q1{box-shadow:inset 3px 0 0 var(--gold)} tr.q1 .pos{color:var(--gold)}
  tr.q3{box-shadow:inset 3px 0 0 var(--teamB)} tr.q3 .pos{color:var(--teamB)}
  .tnm{display:inline-flex;align-items:center;gap:8px}
  .host{font-size:9px;color:var(--navy);background:var(--gold);border-radius:4px;padding:1px 5px;font-weight:800;letter-spacing:.04em}
  .legend{display:flex;gap:18px;flex-wrap:wrap;margin:0 0 18px;font-size:12px;color:var(--mut);font-weight:600}
  .legend i{display:inline-block;width:10px;height:10px;border-radius:3px;margin-right:7px;vertical-align:-1px}

  .projbanner{display:flex;align-items:center;gap:12px;flex-wrap:wrap;background:var(--panel);border:1px solid var(--line2);border-radius:13px;padding:14px 16px;margin-bottom:18px}
  .projbanner .tag{font-size:11px;font-weight:800;letter-spacing:.1em;text-transform:uppercase;color:var(--gold);background:rgba(242,193,78,.1);border:1px solid rgba(242,193,78,.3);border-radius:20px;padding:4px 10px}
  .projbanner p{margin:0;font-size:13px;color:var(--mut);flex:1;min-width:200px;line-height:1.5}
  .btree{overflow-x:auto;-webkit-overflow-scrolling:touch;padding:2px 2px 18px}
  .bhead{display:flex;width:max-content;margin-bottom:6px;padding-left:2px}
  .bhead .bh{font-size:11px;letter-spacing:.12em;text-transform:uppercase;color:var(--teamB);font-weight:800}
  .binner{display:flex;align-items:center;width:max-content}
  .bnode{display:flex;align-items:center}
  .bkids{display:flex;flex-direction:column;justify-content:center;position:relative;flex:none}
  .bkids>.bnode{flex:1 0 auto}
  .bkids::after{content:"";position:absolute;right:0;top:25%;height:50%;width:2px;background:var(--line2);border-radius:2px}
  .bconn{width:22px;height:2px;background:var(--line2);flex:none}
  .bbox{width:200px;flex:none;background:var(--panel);border:1px solid var(--line);border-radius:10px;margin:7px 0;overflow:hidden;box-shadow:var(--shadow)}
  .bbox.islive{border-color:rgba(255,66,87,.55);box-shadow:0 0 22px -10px rgba(255,66,87,.55)}
  .bslot{display:flex;align-items:center;justify-content:space-between;gap:6px;padding:8px 10px;font-size:12.5px;font-weight:600}
  .bslot.win{background:linear-gradient(90deg,rgba(242,193,78,.16),transparent)}
  .bslot.win .teamlink{color:var(--gold)}
  .bslot.lost{opacity:.45}
  .bdiv{height:1px;background:var(--line)}
  .bteam{display:flex;align-items:center;gap:7px;min-width:0}
  .bteam .teamlink{max-width:118px}
  .bteam .seed{font-size:9px;font-weight:800;color:var(--mut2);background:var(--navy);border:1px solid var(--line2);border-radius:4px;padding:2px 4px;min-width:26px;text-align:center;flex:none}
  .bteam .lbl{color:var(--mut);font-size:12px}
  .bcol{display:flex;flex-direction:column;gap:2px;min-width:0;align-items:flex-start}
  .prov{display:inline-flex;align-items:center;gap:5px;font-size:10px;color:var(--mut2);font-weight:700;text-transform:uppercase;letter-spacing:.03em;background:none;border:0;padding:0;cursor:pointer;font-family:inherit}
  .prov:hover{color:var(--teamB)}
  .prov .mark{width:13px;height:13px}
  .bteam .lbl em{color:var(--mut2);font-style:normal;font-size:10.5px;text-transform:uppercase;letter-spacing:.04em}
  .bsc{font-family:'Anton',sans-serif;font-size:16px;flex:none;color:var(--ink)}

  .scorers{background:var(--panel);border:1px solid var(--line);border-radius:14px;overflow:hidden;max-width:640px}
  .scorer{display:flex;align-items:center;gap:13px;padding:11px 18px;border-top:1px solid var(--line)}
  .scorer:first-child{border-top:0}
  .scorer .rk{font-family:'Anton',sans-serif;font-size:18px;color:var(--mut2);width:24px;text-align:center}
  .scorer.top .rk{color:var(--gold)}
  .scorer .hs{width:34px;height:34px;border-radius:50%;object-fit:cover;background:var(--navy);border:1px solid var(--line2);flex:none}
  .scorer .who{flex:1;min-width:0}
  .scorer .who .nm button{font-weight:700;font-size:15px}
  .scorer .who .tm{font-size:12px;color:var(--mut);display:flex;align-items:center;gap:6px;margin-top:2px}
  .scorer .gls{font-family:'Anton',sans-serif;font-size:24px;line-height:1}
  .scorer .gls small{font-family:'Inter';font-size:10px;color:var(--mut2);text-transform:uppercase;letter-spacing:.08em;display:block;text-align:right;font-weight:700}

  .newslist{display:flex;flex-direction:column;gap:11px;max-width:760px}

/* ---------- derive (instant, client-side) ---------- */
function deriveStandings(board){
  const g={};
  board.filter(m=>m.slug==="group-stage").forEach(m=>{
    const L=(m.group||"").replace("Group ","")||"?"; const gr=g[L]=g[L]||{};
    const ens=(name,logo)=>{ const t=gr[name]=gr[name]||{team:name,logo,mp:0,w:0,d:0,l:0,gf:0,ga:0,pts:0,host:!!HOSTS[name]}; return t; };
    const H=ens(m.home,m.homeLogo), A=ens(m.away,m.awayLogo);
    if(m.status==="ft" && m.homeScore!=null && m.awayScore!=null){
      H.mp++;A.mp++; H.gf+=m.homeScore;H.ga+=m.awayScore; A.gf+=m.awayScore;A.ga+=m.homeScore;
      if(m.homeScore>m.awayScore){H.w++;A.l++;H.pts+=3;} else if(m.homeScore<m.awayScore){A.w++;H.l++;A.pts+=3;} else {H.d++;A.d++;H.pts++;A.pts++;}
    }
  });
  return Object.keys(g).sort().map(L=>({group:L, teams:Object.values(g[L]).map(t=>({...t,gd:t.gf-t.ga})).sort((a,b)=>(b.pts-a.pts)||(b.gd-a.gd)||(b.gf-a.gf)||a.team.localeCompare(b.team))}));
}
function deriveScorers(board){
  const m={};
  board.forEach(e=>{ (e.details||[]).forEach(d=>{ if(d.scoringPlay && !d.ownGoal){ const a=d.athletesInvolved&&d.athletesInvolved[0]; if(!a)return;
    const teamName = (d.team&&String(d.team.id)===String(e.homeId))?e.home:e.away;
    const logo = (d.team&&String(d.team.id)===String(e.homeId))?e.homeLogo:e.awayLogo;
    const k=a.id||a.displayName; const o=m[k]=m[k]||{player:a.displayName, team:teamName, logo, hs:a.headshot||"", goals:0}; o.goals++; if(a.headshot)o.hs=a.headshot; } }); });
  return Object.values(m).sort((x,y)=>y.goals-x.goals).slice(0,20);
}
function buildBracket(){
  let level=R32.map(m=>({id:m.id,round:0,leaf:true,top:m.t,bottom:m.b}));
  const levels=[level];
  for(let r=1;r<ROUND_IDS.length;r++){ const ids=ROUND_IDS[r],prev=levels[r-1],cur=[];
    for(let i=0;i<ids.length;i++){ const c1=prev[2*i],c2=prev[2*i+1]; cur.push({id:ids[i],round:r,leaf:false,top:{feed:c1.id},bottom:{feed:c2.id},children:[c1,c2]}); }
    levels.push(cur); }
  return levels[levels.length-1][0];
}
function resolveBracket(root, standings, board){
  const gm={}; (standings||[]).forEach(g=>gm[g.group]=g.teams);
  const done=g=>{ const ts=gm[g]; return ts&&ts.length>=4&&ts.every(t=>t.mp>=3); };
  const slot=s=>{ if(s.w){ const ts=gm[s.w]||[],t=ts[0]; if(done(s.w)&&t) return {name:t.team,logo:t.logo,seed:"1"+s.w};
      return {label:"Winner "+s.w,seed:"1"+s.w,prov:t&&t.mp>0?{name:t.team,logo:t.logo}:null}; }
    if(s.r){ const ts=gm[s.r]||[],t=ts[1]; if(done(s.r)&&t) return {name:t.team,logo:t.logo,seed:"2"+s.r};
      return {label:"Runner-up "+s.r,seed:"2"+s.r,prov:t&&t.mp>0?{name:t.team,logo:t.logo}:null}; }
    if(s.th) return {label:"3rd place",sub:s.th,seed:"3rd"};
    if(s.feed) return {label:"Winner "+s.feed.replace("M",""),feed:s.feed};
    return {label:"TBD"}; };
  const koFt=(board||[]).filter(m=>m.slug&&m.slug!=="group-stage"&&m.status!=="upcoming");
  const find=(a,b)=> koFt.find(m=>[m.home,m.away].indexOf(a)>=0&&[m.home,m.away].indexOf(b)>=0);
  const won={};
  (function walk(n){
    if(n.leaf){ n._t=slot(n.top); n._b=slot(n.bottom); }
    else { n.children.forEach(walk); n._t=slot(n.top); n._b=slot(n.bottom);
      if(won[n.top.feed]) n._t={name:won[n.top.feed].name,logo:won[n.top.feed].logo};
      if(won[n.bottom.feed]) n._b={name:won[n.bottom.feed].name,logo:won[n.bottom.feed].logo}; }
    if(n._t.name&&n._b.name){ const e=find(n._t.name,n._b.name); if(e){ n._live=e.status==="live";
      n._sc=[e.home===n._t.name?e.homeScore:e.awayScore, e.home===n._b.name?e.homeScore:e.awayScore];
      const w=e.homeWin?e.home:e.awayWin?e.away:null; if(w){ n._win=w; won[n.id]={name:w,logo:w===n._t.name?n._t.logo:n._b.logo}; } } }
  })(root);
  return root;
}
function teamColorMap(board){ const m={}; board.forEach(e=>{ if(e.home&&!m[e.home])m[e.home]={color:e.homeColor,alt:e.homeAlt,logo:e.homeLogo}; if(e.away&&!m[e.away])m[e.away]={color:e.awayColor,alt:e.awayAlt,logo:e.awayLogo}; }); return m; }

    return {opp, oppLogo:home?m.awayLogo:m.homeLogo, score:gf+"-"+ga, result:gf>ga?"W":gf<ga?"L":"D"}; });
  const form=played.slice(-5).map(m=>{ const home=m.home===name; const gf=home?m.homeScore:m.awayScore, ga=home?m.awayScore:m.homeScore; return gf>ga?"W":gf<ga?"L":"D"; });
  const next=matches.find(m=>m.status==="upcoming");
  const players={};
  matches.forEach(m=>{ (m.details||[]).forEach(d=>{ const a=d.athletesInvolved&&d.athletesInvolved[0]; if(!a)return; const tn=(d.team&&String(d.team.id)===String(m.homeId))?m.home:m.away; if(tn!==name)return;
    const k=a.id||a.displayName; const p=players[k]=players[k]||{name:a.displayName, hs:a.headshot||"", pos:a.position||"", num:a.jersey||"", goals:0, team:name, logo:m.home===name?m.homeLogo:m.awayLogo}; if(d.scoringPlay&&!d.ownGoal)p.goals++; if(a.headshot)p.hs=a.headshot; }); });
  return { name, matches, last, form, next, players:Object.values(players).sort((a,b)=>b.goals-a.goals).slice(0,10) };
}

async function callClaude(system, prompt, maxTokens){
  const headers={ "Content-Type":"application/json" }; const key=getKey();
  if(key){ headers["x-api-key"]=key; headers["anthropic-version"]="2023-06-01"; headers["anthropic-dangerous-direct-browser-access"]="true"; }
  const r=await fetch("https://api.anthropic.com/v1/messages",{ method:"POST", headers,
    body:JSON.stringify({ model:MODEL, max_tokens:maxTokens||1500, system, messages:[{role:"user",content:prompt}], tools:[{type:"web_search_20250305",name:"web_search",max_uses:4}] }) });
  if(!r.ok){ const t=await r.text().catch(()=> ""); throw new Error("API "+r.status+(t?" — "+t.slice(0,100):"")); }
  const d=await r.json(); return (d.content||[]).filter(b=>b.type==="text").map(b=>b.text).join("\n");
}
function extractJSON(text){ if(!text)return null; let t=text.replace(/```json/gi,"").replace(/```/g,"").trim(); const s=t.indexOf("{"),e=t.lastIndexOf("}"); if(s<0||e<0)return null; let c=t.slice(s,e+1); try{return JSON.parse(c);}catch(_){ try{return JSON.parse(c.replace(/,\s*([}\]])/g,"$1"));}catch(__){return null;} } }
const todayStr=()=>new Date().toLocaleDateString("en-US",{month:"long",day:"numeric",year:"numeric"});
async function fetchAnalysis(h,a){

  useEffect(()=>{ const k=h+"|"+a; if(prev.current!==undefined&&prev.current!==k){ setBump(true); const t=setTimeout(()=>setBump(false),650); prev.current=k; return ()=>clearTimeout(t); } prev.current=k; },[h,a]);
  const H=Number(h)||0,A=Number(a)||0,t=H+A,hp=t?Math.round(H/t*100):50;
  return (<div className={"ltile"+(bump?" bump":"")}>
    <div className="lt">{label}</div>
    <div className="lv"><span className="lh">{h!=null?h:0}{suffix||""}</span><span className="la">{a!=null?a:0}{suffix||""}</span></div>
    <div className="track"><span className="th" style={{width:hp+"%"}} /><span className="ta" style={{width:(100-hp)+"%"}} /></div>
  </div>);
}

/* ---------------- App ---------------- */
function App(){
  const [tab,setTab]=useState("matches");
  const [board,setBoard]=useState(null);
  const [err,setErr]=useState("");
  const [load,setLoad]=useState(false);
  const [updated,setUpdated]=useState(null);
  const [source,setSource]=useState("");
  const [auto,setAuto]=useState(true);
  const [settings,setSettings]=useState(false);
  const [hasKey,setHasKey]=useState(!!getKey());
  const [onlyFav,setOnlyFav]=useState(false);
  const [favs,setFavs]=useState(()=> new Set(lsGet("favs")||[]));
  const [themeTeam,setThemeTeam]=useState(()=> lsGet("theme")||"USA 250");
  const [dayKey,setDayKey]=useState(null);

  const [news,setNews]=useState(null),[nErr,setNErr]=useState(""),[nLoad,setNLoad]=useState(false);
  const [team,setTeam]=useState(null);
  const [player,setPlayer]=useState(null),[bio,setBio]=useState(null),[bioLoad,setBioLoad]=useState(false);
  const [detailId,setDetailId]=useState(null);
  const [predA,setPredA]=useState(""),[predB,setPredB]=useState(""),[analysis,setAnalysis]=useState(null),[anaLoad,setAnaLoad]=useState(false),[anaErr,setAnaErr]=useState("");
  const [toasts,setToasts]=useState([]),[flash,setFlash]=useState(0),[,force]=useState(0);
  const prevRef=useRef(null), armed=useRef(false), newsArmed=useRef(false), loadedNews=useRef(false);

  const toggleFav=useCallback(n=>{ setFavs(p=>{ const x=new Set(p); x.has(n)?x.delete(n):x.add(n); lsSet("favs",[...x]); return x; }); },[]);
  const setTheme=useCallback(t=>{ setThemeTeam(t); lsSet("theme",t); },[]);
  const setFavoriteTeam=useCallback(t=>{ setThemeTeam(t); lsSet("theme",t); if(t&&t!=="USA 250"){ setFavs(p=>{ const x=new Set(p); x.add(t); lsSet("favs",[...x]); return x; }); } },[]);

  /* derived (instant) */
  const standings=useMemo(()=>board?deriveStandings(board):null,[board]);
  const scorers=useMemo(()=>board?deriveScorers(board):null,[board]);
  const bracketTree=useMemo(()=>board?resolveBracket(buildBracket(),deriveStandings(board),board):null,[board]);
  const anyKO=useMemo(()=>(board||[]).some(m=>m.slug&&m.slug!=="group-stage"),[board]);
  const colors=useMemo(()=>board?teamColorMap(board):{},[board]);
  const gsTeams=useMemo(()=>{ const s=new Set(); (board||[]).forEach(m=>{ if(m.slug==="group-stage"){ if(m.home)s.add(m.home); if(m.away)s.add(m.away); } }); return s; },[board]);
  const allTeams=useMemo(()=>[...gsTeams].sort(),[gsTeams]);
  const visibleMatches=useMemo(()=>(board||[]).filter(m=>m.slug==="group-stage"||(gsTeams.has(m.home)&&gsTeams.has(m.away))),[board,gsTeams]);
  const days=useMemo(()=>{ const mp={}; visibleMatches.forEach(m=>{ const k=dayKeyOf(m.date); (mp[k]=mp[k]||{key:k,label:dayLabel(m.date),items:[]}).items.push(m); }); return Object.values(mp).sort((a,b)=>a.key-b.key); },[visibleMatches]);
  const liveCount=(board||[]).filter(m=>m.status==="live").length;
  const favNext=useMemo(()=>{ const nextFor=t=>visibleMatches.filter(m=>m.status!=="ft"&&(m.home===t||m.away===t)).sort((a,b)=>new Date(a.date)-new Date(b.date))[0]||null;
    if(themeTeam&&themeTeam!=="USA 250"){ const n=nextFor(themeTeam); if(n)return n; }
    if(favs.size){ const c=visibleMatches.filter(m=>m.status!=="ft"&&[...favs].some(t=>t===m.home||t===m.away)).sort((a,b)=>new Date(a.date)-new Date(b.date)); return c[0]||null; }
    return null; },[themeTeam,favs,visibleMatches]);

  /* apply theme colors */
  useEffect(()=>{ const r=document.documentElement.style; let a="#E2483D",b="#5B8DEF";
    if(themeTeam&&themeTeam!=="USA 250"&&colors[themeTeam]){ const c=colors[themeTeam]; let A=c.color&&c.color.toLowerCase()!=="ffffff"?c.color:(c.alt||"E2483D"); let B=c.alt&&c.alt.toLowerCase()!=="ffffff"?c.alt:(c.color||"5B8DEF"); if(A===B)B="5B8DEF"; a="#"+A; b="#"+B; }
    r.setProperty("--teamA",a); r.setProperty("--teamB",b); r.setProperty("--teamAink",ink(a));
  },[themeTeam,colors]);

  /* goal alerts */
  const diff=useCallback((nb,favSet)=>{ const idx={}; nb.forEach(m=>{ if(m.homeScore!=null&&m.awayScore!=null) idx[m.id]={h:m.homeScore,a:m.awayScore}; });
    if(!armed.current){ prevRef.current=idx; armed.current=true; return; }
    const prev=prevRef.current||{}; const evs=[];
    nb.forEach(m=>{ if(m.homeScore==null||m.awayScore==null)return; const p=prev[m.id]; if(p){ if(m.homeScore>p.h)evs.push({team:m.home,opp:m.away,score:m.homeScore+"-"+m.awayScore}); if(m.awayScore>p.a)evs.push({team:m.away,opp:m.home,score:m.homeScore+"-"+m.awayScore}); } });
    prevRef.current=idx;
    if(evs.length){ setFlash(f=>f+1); const items=evs.map(ev=>({id:Math.random().toString(36).slice(2),team:ev.team,opp:ev.opp,score:ev.score,fav:favSet.has(ev.team)})); setToasts(t=>[...t,...items]); items.forEach(it=>setTimeout(()=>setToasts(t=>t.filter(x=>x.id!==it.id)),6500));

  },[]);

    catch(e){ if(!board) setErr(e.message||"Couldn't load"); }
    finally{ if(!silent)setLoad(false); } },[diff,favs,board]);

  const loadLive=useCallback(async ()=>{ // fast: just today, merge

      const today=await espnScoreboard(ds); if(!today.length)return;
      setBoard(prev=>{ if(!prev)return prev; const map={}; prev.forEach(m=>map[m.id]=m); today.forEach(m=>map[m.id]=m); const merged=Object.values(map); diff(merged,favs); lsSet("board",{data:merged,ts:Date.now()}); return merged; });
      setUpdated(new Date()); setSource("live");
    }catch(e){} },[diff,favs]);

  const loadNews=useCallback(async ()=>{ setNLoad(true); setNErr(""); try{ const items=await fetchNews(); setNews(items); }catch(e){ setNErr(e.message||"Couldn't load news"); } finally{ setNLoad(false); } },[]);

  const openPlayer=useCallback(p=>{ setPlayer(p); setBio(null); },[]);
  const loadBio=useCallback(async ()=>{ if(!player)return; setBioLoad(true); try{ const b=await fetchBio(player.name,player.team); setBio(b||{bio:"No extra details found."}); }catch(e){ setBio({bio:"Couldn't load bio."}); } finally{ setBioLoad(false); } },[player]);
  const teamPlayer=useCallback((a,team,logo)=>({name:a.displayName,team,logo,hs:a.headshot||"",pos:a.position||"",num:a.jersey||"",goals:0}),[]);

  const runAnalysis=useCallback(async (h,a)=>{ if(!h||!a||h===a)return; setPredA(h);setPredB(a); setAnaErr("");setAnalysis(null);setAnaLoad(true);
    try{ const d=await fetchAnalysis(h,a); if(!d)throw new Error("No data"); setAnalysis(d); }catch(e){ setAnaErr(e.message||"Couldn't analyze"); } finally{ setAnaLoad(false); } },[]);

  /* mount */
  useEffect(()=>{ const c=lsGet("board"); if(c){ setBoard(c.data); setUpdated(new Date(c.ts)); setSource("cached"); prevRef.current=null; } loadBoard(); // eslint-disable-next-line
  },[]);
  useEffect(()=>{ if(tab==="news"&&!loadedNews.current){ loadedNews.current=true; loadNews(); } },[tab,loadNews]);

  /* smart polling */
  useEffect(()=>{ if(!auto)return; const ms=liveCount>0?20000:120000; const id=setInterval(()=>{ if(!document.hidden){ liveCount>0?loadLive():loadBoard(true); } },ms); return ()=>clearInterval(id); },[auto,liveCount,loadLive,loadBoard]);
  useEffect(()=>{ const v=()=>{ if(!document.hidden) loadLive(); }; document.addEventListener("visibilitychange",v); const t=setInterval(()=>force(x=>x+1),1000); return ()=>{ document.removeEventListener("visibilitychange",v); clearInterval(t); }; },[loadLive]);

  /* default selected day = today or nearest */
  useEffect(()=>{ if(!days.length||dayKey!=null)return; const d=new Date(); const tk=d.getFullYear()*10000+(d.getMonth()+1)*100+d.getDate(); let best=days[0].key, bestDiff=Infinity; days.forEach(x=>{ const diff=Math.abs(x.key-tk); if(diff<bestDiff){bestDiff=diff;best=x.key;} }); setDayKey(best); },[days,dayKey]);

  const dayIdx=days.findIndex(d=>d.key===dayKey);

  let dayItems=curDay?curDay.items:[]; if(onlyFav) dayItems=dayItems.filter(m=>favs.has(m.home)||favs.has(m.away));
  dayItems=dayItems.slice().sort((a,b)=>{ const fa=(favs.has(a.home)||favs.has(a.away))?0:1, fb=(favs.has(b.home)||favs.has(b.away))?0:1; return fa-fb || new Date(a.date)-new Date(b.date); });

  const detailMatch=detailId&&board?board.find(m=>m.id===detailId):null;
  const detailLive=!!(detailMatch&&detailMatch.status==="live");
  useEffect(()=>{ if(!detailId||!detailLive)return; const id=setInterval(()=>{ if(!document.hidden) loadLive(); },12000); return ()=>clearInterval(id); },[detailId,detailLive,loadLive]);
  const teamInfoObj=team&&board?teamInfo(board,team):null;

        {heroCd && <Countdown label={heroCdLabel} cd={heroCd} />}
      </div>

      <div className="tabs">
        <button className={"tab"+(tab==="matches"?" active":"")} onClick={()=>setTab("matches")}>Matches{liveCount>0 && <span className="badge">{liveCount}</span>}</button>
        <button className={"tab"+(tab==="standings"?" active":"")} onClick={()=>setTab("standings")}>Standings</button>
        <button className={"tab"+(tab==="bracket"?" active":"")} onClick={()=>setTab("bracket")}>Bracket</button>
        <button className={"tab"+(tab==="stats"?" active":"")} onClick={()=>setTab("stats")}>Golden Boot</button>
        <button className={"tab"+(tab==="news"?" active":"")} onClick={()=>setTab("news")}>News</button>
        <button className={"tab"+(tab==="predict"?" active":"")} onClick={()=>setTab("predict")}>Predict</button>
      </div>

      {err && !board && <div className="banner"><span>Couldn't reach the live feed — {err}</span><button className="btn" onClick={()=>loadBoard()}>Try again</button></div>}
      {board===null && !err && <Loader label="Loading the tournament…" />}

      {board && tab==="matches" && (<div>
        {favNext && (()=>{ const ft=favs.has(favNext.home)?favNext.home:favNext.away; const opp=ft===favNext.home?favNext.away:favNext.home; const oppLogo=ft===favNext.home?favNext.awayLogo:favNext.homeLogo; const ftLogo=ft===favNext.home?favNext.homeLogo:favNext.awayLogo; const cd=favNext.status==="live"?null:countdown(new Date(favNext.date).getTime());
          return (<div className="favcd" onClick={()=>setDetailId(favNext.id)} role="button" tabIndex={0}>
            <span className="fteam"><Mark name={ft} logo={ftLogo} big={true} />{ft}</span>
            <span className="fopp">{favNext.status==="live"?"playing now":"next match"} · vs <Mark name={opp} logo={oppLogo} /> {opp}<br/>{new Date(favNext.date).toLocaleString("en-US",{weekday:"short",month:"short",day:"numeric",hour:"numeric",minute:"2-digit"})}</span>
            {favNext.status==="live"?<span className="units"><span className="live-pill" style={{fontSize:14}}><span className="dot" />LIVE</span></span>:cd&&<span className="units">{cd.days>0&&<span className="cunit"><b>{cd.days}</b><span>d</span></span>}<span className="cunit"><b>{String(cd.h).padStart(2,"0")}</b><span>hr</span></span><span className="cunit"><b>{String(cd.m).padStart(2,"0")}</b><span>min</span></span><span className="cunit"><b>{String(cd.s).padStart(2,"0")}</b><span>sec</span></span></span>}
          </div>); })()}
        {favs.size>0 && <div className="filterbar"><button className={"chip"+(onlyFav?" on":"")} onClick={()=>setOnlyFav(v=>!v)}>★ Following only ({favs.size})</button></div>}
        {days.length>0 && <div className="datenav">
          <button onClick={()=>dayIdx>0&&setDayKey(days[dayIdx-1].key)} disabled={dayIdx<=0} aria-label="Previous day">‹</button>
          <span className="dl">{curDay?curDay.label:""}</span>
          <span className="dc">{dayItems.length} match{dayItems.length!==1?"es":""}</span>
          <button onClick={()=>dayIdx<days.length-1&&setDayKey(days[dayIdx+1].key)} disabled={dayIdx>=days.length-1} aria-label="Next day">›</button>
        </div>}
        {dayItems.length===0 ? <div className="empty"><h3>No matches{onlyFav?" for your teams":""} this day</h3><p>Use the arrows to browse other matchdays.</p></div>
          : <div className="matches">{dayItems.map(m=><MatchCard key={m.id} m={m} onTeam={setTeam} onOpen={mm=>setDetailId(mm.id)} favs={favs} toggleFav={toggleFav} />)}</div>}
      </div>)}

      {board && tab==="standings" && (<div>
        <div className="legend"><span><i style={{background:"var(--gold)"}} />Top 2 — advance to Round of 32</span><span><i style={{background:"var(--teamB)"}} />3rd — best-third race</span><span><span className="host" style={{marginRight:7}}>H</span>Host</span></div>
        {standings&&standings.length>0?<div className="groups">{standings.map(g=><GroupCard key={g.group} g={g} onTeam={setTeam} />)}</div>:<div className="empty"><h3>Standings build as games finish</h3><p>Group tables populate from completed results.</p></div>}
      </div>)}

      {board && tab==="bracket" && (<div>
        <div className="projbanner"><span className="tag">{anyKO?"Live":"Projected"}</span><p>{anyKO?"The knockout bracket — winners advance to the right. Tap any team for details.":"The knockout bracket (Round of 32 → Final). Each seed locks once that group is decided; until then it shows the current projected qualifier (\u201cproj.\u201d). Group games — like the USA's next match — are on the Matches tab."}</p>{!anyKO&&countdown(R32_DATE)&&<Countdown label="Bracket locks in" cd={countdown(R32_DATE)} />}</div>
        <div className="btree">
          <div className="bhead">{ROUND_NAMES.map((n,i)=><div className="bh" key={n} style={{flex:"0 0 "+(i===ROUND_NAMES.length-1?202:224)+"px"}}>{n}</div>)}</div>
          <div className="binner">{bracketTree&&<BNode node={bracketTree} onTeam={setTeam} />}</div>
        </div>
      </div>)}

      {board && tab==="stats" && (<div>
        {scorers&&scorers.length>0?<div className="scorers">{scorers.map((s,i)=>(<div className={"scorer"+(i<3?" top":"")} key={i}>
          <span className="rk">{i+1}</span>{s.hs?<img className="hs" src={s.hs} alt="" />:<span className="hs" style={{display:"inline-flex",alignItems:"center",justifyContent:"center"}}><Mark name={s.team} logo={s.logo} /></span>}
          <div className="who"><div className="nm"><button className="teamlink" onClick={()=>openPlayer({name:s.player,team:s.team,logo:s.logo,hs:s.hs,goals:s.goals,pos:"",num:""})}>{s.player}</button></div><div className="tm"><Mark name={s.team} logo={s.logo} /><button className="teamlink" onClick={()=>setTeam(s.team)}>{s.team}</button></div></div>
          <span className="gls">{s.goals}<small>goals</small></span></div>))}</div>
        :<div className="empty"><h3>No goals logged yet</h3><p>The Golden Boot race fills in as goals are scored.</p></div>}
      </div>)}

      {tab==="news" && (<div>
        {nErr && <div className="banner"><span>Couldn't load news — {nErr}</span><button className="btn" onClick={loadNews}>Try again</button></div>}
        {news===null && !nErr && <Loader label="Fetching the latest headlines…" />}
        {news&&news.length>0 && <div className="newslist">{news.map((n,i)=>(<div className="newsitem" key={i}><h4>{n.link?<a href={n.link} target="_blank" rel="noopener noreferrer">{n.title}</a>:n.title}</h4>{n.summary&&<p>{n.summary}</p>}<div className="src">{n.source||"ESPN"}{n.time?(" · "+n.time):""}</div></div>))}</div>}
        {news&&news.length===0&&!nErr && <div className="empty"><h3>No headlines right now</h3><p>Try again shortly.</p></div>}
        {nLoad&&news!==null && <div style={{textAlign:"center",color:"var(--mut)",fontSize:13,marginTop:18}}>Refreshing…</div>}
      </div>)}

      {board && tab==="predict" && (<div className="predwrap">
        <div className="predpick"><div className="sech" style={{marginTop:0}}>Build a matchup</div>
          <div className="selrow">
            <select value={predA} onChange={e=>setPredA(e.target.value)}><option value="">Home team…</option>{allTeams.map(t=><option key={t} value={t}>{t}</option>)}</select>
            <span style={{color:"var(--mut2)",fontWeight:800}}>vs</span>
            <select value={predB} onChange={e=>setPredB(e.target.value)}><option value="">Away team…</option>{allTeams.map(t=><option key={t} value={t}>{t}</option>)}</select>
            <button className="btn primary" disabled={!predA||!predB||predA===predB||anaLoad} onClick={()=>runAnalysis(predA,predB)}>{anaLoad?"Analyzing…":"Analyze"}</button>
          </div>
          {!hasKey && <div className="note" style={{marginTop:12}}>Predictions use AI — add an Anthropic API key in ⚙ Settings when self-hosting. (Works as-is inside Claude.)</div>}
          {upcoming.length>0 && <div><div className="sech">Or pick an upcoming fixture</div><div className="upfix">{upcoming.map((m,i)=><button key={i} onClick={()=>runAnalysis(m.home,m.away)}><Mark name={m.home} logo={m.homeLogo} />{m.home} v {m.away}<Mark name={m.away} logo={m.awayLogo} /></button>)}</div></div>}
        </div>
        {anaErr && <div className="banner"><span>Couldn't analyze — {anaErr}</span><button className="btn" onClick={()=>runAnalysis(predA,predB)}>Retry</button></div>}
        {anaLoad && !analysis && <Loader label="Researching form and running the model…" />}
        {analysis && (<div className="predcard">
          <div className="predhead"><span className="side"><Mark name={predA} logo={colors[predA]&&colors[predA].logo} />{predA}</span><span className="vs">VS</span><span className="side">{predB}<Mark name={predB} logo={colors[predB]&&colors[predB].logo} /></span></div>
          {analysis.prediction && <div><div className="probbar"><span className="probseg h" style={{width:(analysis.prediction.home||0)+"%"}}>{analysis.prediction.home}%</span><span className="probseg d" style={{width:(analysis.prediction.draw||0)+"%"}}>{analysis.prediction.draw}%</span><span className="probseg a" style={{width:(analysis.prediction.away||0)+"%"}}>{analysis.prediction.away}%</span></div><div className="problbl"><span>{predA} win</span><span>Draw</span><span>{predB} win</span></div></div>}
          {analysis.scoreline && <div className="predscore"><b>{analysis.scoreline}</b><span>Predicted scoreline</span></div>}
          {analysis.factors&&analysis.factors.length>0 && <div><div className="sech">Key factors</div><ul className="factors">{analysis.factors.map((f,i)=><li key={i}>{f}</li>)}</ul></div>}
          {analysis.xfactor && <div><div className="sech">X-factor</div><p className="outlook" style={{marginTop:0}}>{analysis.xfactor}</p></div>}
          {analysis.verdict && <div><div className="sech">Verdict</div><p style={{fontSize:14,lineHeight:1.6,margin:0}}>{analysis.verdict}</p></div>}
          <div className="note" style={{marginTop:16}}>AI projection — for fun, not betting advice.</div>
        </div>)}
      </div>)}

      <footer><span>Live data: ESPN public feed · Predictions: AI · Original USA‑250 theme (not an official mark)</span><span>Final at MetLife Stadium, NJ · Jul 19</span></footer>

      {team && teamInfoObj && <TeamModal info={teamInfoObj} standings={standings} onClose={()=>setTeam(null)} fav={favs.has(team)} toggleFav={toggleFav} onPlayer={openPlayer} setTheme={setFavoriteTeam} themeTeam={themeTeam} />}
      {player && <PlayerModal player={player} bio={bio} bioLoad={bioLoad} onBio={loadBio} onClose={()=>{ setPlayer(null); setBio(null); }} onTeam={(t)=>{ setPlayer(null); setTeam(t); }} />}
      {detailMatch && <MatchModal m={detailMatch} onClose={()=>setDetailId(null)} onPlayer={openPlayer} onTeam={(t)=>{ setDetailId(null); setTeam(t); }} teamPlayer={teamPlayer} />}
      {settings && <Settings onClose={()=>setSettings(false)} onSaved={()=>setHasKey(!!getKey())} />}

      {flash>0 && <div className="flash" key={flash} />}
      <div className="toasts">{toasts.map(t=>(<div className={"toast"+(t.fav?" fav":"")} key={t.id}><div className="gl">{t.fav?"★ Goal":"Goal"}</div><div className="ms">{t.team} {t.score} <span style={{color:"var(--mut)",fontWeight:600}}>vs {t.opp}</span></div></div>))}</div>
    </div>
  );
}
ReactDOM.createRoot(document.getElementById("root")).render(<App />);
</script>
</body>
</html>
